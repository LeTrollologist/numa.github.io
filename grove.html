<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grove • Numa's Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-top: #0a0c14;
  --bg-bottom: #05070f;
  --accent: #c4b5fd;
  --text: #e0e7ff;
  --muted: #8b9dc3;
  --panel: rgba(15, 17, 28, 0.95);
  --btn-bg: rgba(196, 181, 253, 0.1);
  --btn-border: rgba(196, 181, 253, 0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh;
  background: var(--bg-top);
  color: var(--text);
  font-family: 'Space Grotesk', system_ui, sans-serif;
  overflow: hidden;
  user-select: none;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  height: 64px;
  background: var(--panel);
  border-bottom: 1px solid rgba(196, 181, 253, 0.15);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: #e0e7ff;
  letter-spacing: -0.5px;
  font-weight: 600;
}
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}
.garden-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
  transition: background 1.5s ease;
}
#garden-canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}
#plants-svg {
  position: relative;
  z-index: 10;
  width: 900px;
  height: 700px;
  overflow: visible;
}
.sidebar {
  width: 280px;
  background: var(--panel);
  border-left: 1px solid rgba(196, 181, 253, 0.15);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  z-index: 50;
  backdrop-filter: blur(10px);
}
.action-btn {
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  color: #c7d2fe;
  padding: 12px 16px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-size: 0.95rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}
.action-btn:hover:not(:disabled) {
  background: rgba(196, 181, 253, 0.2);
  border-color: #c4b5fd;
  transform: translateY(-1px);
}
.action-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: rgba(255, 255, 255, 0.02);
  border-color: rgba(255, 255, 255, 0.1);
}
.theme-btn {
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid rgba(196, 181, 253, 0.15);
  background: rgba(196, 181, 253, 0.05);
  color: #c7d2fe;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
  text-align: center;
  flex: 1;
}
.theme-btn:hover { background: rgba(196, 181, 253, 0.15); }
.theme-btn.active {
  background: rgba(196, 181, 253, 0.3);
  border-color: #c4b5fd;
  box-shadow: 0 0 15px rgba(196, 181, 253, 0.1);
}
.themes-grid { display: flex; gap: 8px; }
.status {
  height: 40px;
  background: var(--bg-bottom);
  border-top: 1px solid rgba(196, 181, 253, 0.1);
  display: flex;
  align-items: center;
  padding: 0 24px;
  font-size: 0.85rem;
  color: var(--muted);
  transition: background 1.5s ease;
}
.plant-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  fill: var(--accent);
  text-anchor: middle;
  pointer-events: all;
  cursor: pointer;
  transition: opacity 0.3s;
}
.plant-name:hover {
  text-decoration: underline;
  opacity: 0.8;
}
/* Animations */
@keyframes sway {
  0% { transform: rotate(-2deg); }
  100% { transform: rotate(2deg); }
}
@keyframes sway-leaf {
  0% { transform: rotate(-4deg); }
  100% { transform: rotate(4deg); }
}
@keyframes pulse-glow {
  0% { filter: drop-shadow(0 0 4px currentColor); transform: scale(0.98); }
  100% { filter: drop-shadow(0 0 16px currentColor); transform: scale(1.02); }
}
@keyframes grow-up {
  0% { transform: scale(0.8) translateY(20px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.plant-group { animation: sway 7s ease-in-out infinite alternate; }
.leaf-group { animation: sway-leaf 5s ease-in-out infinite alternate; }
.flower-group { animation: pulse-glow 3s ease-in-out infinite alternate; }
.plant-wrapper { animation: grow-up 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display: flex; align-items: center; gap: 16px;">
      <div class="logo">The Grove</div>
      <div style="color: #8b9dc3; font-size: 0.9rem; margin-top: 4px;">Numa's Quiet Place</div>
    </div>
    <div style="margin-left: auto; display: flex; gap: 12px;">
      <button onclick="showStats()" style="background: rgba(196,181,253,0.1); border: 1px solid rgba(196, 181, 253, 0.3); color: #c7d2fe; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.2s;">Stats</button>
      <button onclick="exportGarden()" style="background: #c4b5fd; color: #0a0c14; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.85rem; box-shadow: 0 0 15px rgba(196,181,253,0.3); transition: 0.2s;">Export Data</button>
    </div>
  </header>

  <div class="main">
    <div class="garden-container" id="garden-container">
      <canvas id="garden-canvas"></canvas>
      <svg id="plants-svg"></svg>
    </div>

    <div class="sidebar">
      <div>
        <h4 style="margin-bottom: 16px; color: #e0e7ff; font-weight: 500; font-family: 'Playfair Display', serif; font-size: 1.2rem;">Care for the Grove</h4>
        
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button id="btn-water" onclick="performAction('water')" class="action-btn">
            <span>💧 Water Garden</span> <span class="timer"></span>
          </button>
          <button id="btn-talk" onclick="performAction('talk')" class="action-btn">
            <span>💬 Talk to Plants</span> <span class="timer"></span>
          </button>
          <button id="btn-pet" onclick="performAction('pet')" class="action-btn">
            <span>✨ Pet the Leaves</span> <span class="timer"></span>
          </button>
        </div>
        
        <div style="margin-top: 32px;">
          <h4 style="margin-bottom: 12px; color: #e0e7ff; font-weight: 500; font-family: 'Playfair Display', serif; font-size: 1.1rem;">Atmosphere</h4>
          <div class="themes-grid">
            <div onclick="setTheme('mist')" class="theme-btn active" id="theme-mist">Mist</div>
            <div onclick="setTheme('moonlit')" class="theme-btn" id="theme-moonlit">Moonlit</div>
            <div onclick="setTheme('ember')" class="theme-btn" id="theme-ember">Ember</div>
          </div>
        </div>
      </div>
      
      <div style="margin-top: auto; font-size: 0.8rem; color: #6b7280; line-height: 1.5;">
        The garden grows with time and care.<br>
        Click a plant's name to rename it.<br>
        Come back often.
      </div>
    </div>
  </div>

  <div class="status">
    <span id="status-text">The Grove is quiet tonight...</span>
    <span style="margin-left: auto;" id="growth-text">Growth Stage: 0/15</span>
  </div>
</div>

<script>
// ================== STATE ==================
let plants = {
  moonflower: { stage: 1, health: 100, name: "Moonflower" },
  star: { stage: 1, health: 100, name: "Starbloom" },
  ember: { stage: 1, health: 100, name: "Emberleaf" }
};

let lastVisit = localStorage.getItem('grove_lastVisit') || Date.now();
let currentTheme = localStorage.getItem('grove_theme') || 'mist';
let milestones = JSON.parse(localStorage.getItem('grove_milestones') || '[]');

const COOLDOWNS = { water: 15000, talk: 8000, pet: 5000 };
let activeCooldowns = { water: 0, talk: 0, pet: 0 };

const themesData = {
  mist: { top: '#05070f', bottom: '#0a0c14', accent: '#c4b5fd', fog: 'rgba(180, 200, 255, 0.05)', fly: '#e0e7ff' },
  moonlit: { top: '#0a0f1f', bottom: '#161b33', accent: '#a5b4fc', fog: 'rgba(165, 180, 252, 0.07)', fly: '#a5b4fc' },
  ember: { top: '#1a0b05', bottom: '#2a1205', accent: '#fdba74', fog: 'rgba(253, 186, 116, 0.05)', fly: '#fef08c' }
};

const canvas = document.getElementById('garden-canvas');
const ctx = canvas.getContext('2d');
let fogParticles =[];
let fireflies =[];
let animationFrameId;

// ================== INITIALIZE ==================
function init() {
  const savedPlants = localStorage.getItem('grove_plants');
  if (savedPlants) plants = JSON.parse(savedPlants);
  
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  
  calculatePassiveGrowth();
  setTheme(currentTheme, true);
  
  createFog();
  createFireflies();
  drawSVGPlants();
  updateUI();
  
  animateCanvas();
  setInterval(saveToLocalStorage, 30000);
  setInterval(updateCooldownUI, 100);
  
  setStatus("The garden remembers your last visit...", 4000);
}

function resizeCanvas() {
  const container = document.getElementById('garden-container');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}

function setStatus(msg, timeout = 3000) {
  document.getElementById('status-text').innerText = msg;
  if(window.statusTimer) clearTimeout(window.statusTimer);
  window.statusTimer = setTimeout(() => {
    document.getElementById('status-text').innerText = "The Grove is quiet tonight...";
  }, timeout);
}

function updateUI() {
  const totalStage = Object.values(plants).reduce((sum, p) => sum + p.stage, 0);
  document.getElementById('growth-text').innerText = `Combined Growth: ${totalStage}/15`;
  checkMilestones(totalStage);
}

function calculatePassiveGrowth() {
  const now = Date.now();
  const hoursPassed = (now - lastVisit) / (1000 * 60 * 60);
  
  if (hoursPassed > 0.5) {
    let grown = false;
    Object.keys(plants).forEach(key => {
      if (plants[key].stage < 5) {
        let boost = Math.floor(hoursPassed / 6);
        if (boost > 0) {
          plants[key].stage = Math.min(5, plants[key].stage + boost);
          grown = true;
        }
      }
    });
    if (grown) setStatus(`The garden grew while you were away...`);
  }
  lastVisit = now;
  saveToLocalStorage();
}

// ================== SVG DRAWING ==================
function createSVG(tag, attrs) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (let k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function drawSVGPlants() {
  const svg = document.getElementById('plants-svg');
  svg.innerHTML = ''; 
  
  const width = 900;
  const groundY = 550;

  drawMoonflower(svg, 220, groundY, plants.moonflower.stage);
  drawStarbloom(svg, 450, groundY + 20, plants.star.stage);
  drawEmberleaf(svg, 680, groundY - 10, plants.ember.stage);

  // Draw Names
  Object.entries({moonflower: [220, groundY+30], star:[450, groundY+50], ember: [680, groundY+20]}).forEach(([key, pos]) => {
    const text = createSVG('text', {
      x: pos[0], y: pos[1], 
      class: 'plant-name',
      onclick: `renamePlant('${key}')`
    });
    text.textContent = plants[key].name;
    text.style.opacity = plants[key].stage >= 2 ? '1' : '0.5';
    svg.appendChild(text);
  });
}

// Complex SVG Generation per plant type
function drawMoonflower(svg, x, y, stage) {
  const scale = 0.5 + (stage * 0.1);
  const color = stage >= 4 ? '#e0e7ff' : '#c4b5fd';
  const h = 180 * scale;

  const wrapper = createSVG('g', { class: 'plant-wrapper' });
  const g = createSVG('g', { transform: `translate(${x}, ${y})`, class: 'plant-group', style: 'transform-origin: 0px 0px;' });
  
  // Stem
  g.appendChild(createSVG('path', { d: `M 0,0 Q -30,${-h/2} 0,${-h}`, stroke: '#4a5568', 'stroke-width': 4 * scale, fill: 'none', 'stroke-linecap': 'round' }));
  
  // Leaves
  const lGroup = createSVG('g', { class: 'leaf-group', style: 'transform-origin: 0px -50px;' });
  lGroup.appendChild(createSVG('path', { d: `M 0,${-h*0.4} Q -40,${-h*0.4} -50,${-h*0.6} Q -20,${-h*0.7} 0,${-h*0.4}`, fill: '#2d3748' }));
  lGroup.appendChild(createSVG('path', { d: `M 0,${-h*0.6} Q 40,${-h*0.5} 45,${-h*0.7} Q 15,${-h*0.8} 0,${-h*0.6}`, fill: '#2d3748' }));
  g.appendChild(lGroup);

  // Flower
  if (stage >= 3) {
    const fGroup = createSVG('g', { transform: `translate(0, ${-h})`, class: 'flower-group', style: `color: ${color}` });
    for (let i = 0; i < 6; i++) {
      const petal = createSVG('path', {
        d: `M 0,0 C -15,-20 -20,-45 0,-60 C 20,-45 15,-20 0,0`,
        fill: color,
        transform: `rotate(${i * 60})`,
        opacity: 0.85
      });
      fGroup.appendChild(petal);
    }
    fGroup.appendChild(createSVG('circle', { cx: 0, cy: 0, r: 8 * scale, fill: '#fef3c7' }));
    g.appendChild(fGroup);
  }
  wrapper.appendChild(g);
  svg.appendChild(wrapper);
}

function drawStarbloom(svg, x, y, stage) {
  const scale = 0.5 + (stage * 0.1);
  const color = stage >= 4 ? '#fef08c' : '#a5f3fc';
  const h = 160 * scale;

  const wrapper = createSVG('g', { class: 'plant-wrapper' });
  const g = createSVG('g', { transform: `translate(${x}, ${y})`, class: 'plant-group', style: 'transform-origin: 0px 0px; animation-duration: 6s;' });
  
  // Stem (Angular)
  g.appendChild(createSVG('path', { d: `M 0,0 L 10,${-h*0.3} L -5,${-h*0.6} L 0,${-h}`, stroke: '#3f3f46', 'stroke-width': 3.5 * scale, fill: 'none', 'stroke-linejoin': 'round' }));
  
  // Leaves (Sharp)
  const lGroup = createSVG('g', { class: 'leaf-group', style: 'transform-origin: 0px -40px; animation-duration: 4s;' });
  lGroup.appendChild(createSVG('polygon', { points: `0,${-h*0.3} -40,${-h*0.4} -10,${-h*0.45}`, fill: '#27272a' }));
  lGroup.appendChild(createSVG('polygon', { points: `0,${-h*0.5} 35,${-h*0.6} 10,${-h*0.65}`, fill: '#27272a' }));
  g.appendChild(lGroup);

  // Flower
  if (stage >= 3) {
    const fGroup = createSVG('g', { transform: `translate(0, ${-h})`, class: 'flower-group', style: `color: ${color}` });
    for (let i = 0; i < 8; i++) {
      fGroup.appendChild(createSVG('polygon', {
        points: `0,0 -8,-25 0,-45 8,-25`,
        fill: (i%2===0) ? color : '#ffffff',
        transform: `rotate(${i * 45})`,
        opacity: 0.9
      }));
    }
    fGroup.appendChild(createSVG('circle', { cx: 0, cy: 0, r: 6 * scale, fill: '#fffbeb' }));
    g.appendChild(fGroup);
  }
  wrapper.appendChild(g);
  svg.appendChild(wrapper);
}

function drawEmberleaf(svg, x, y, stage) {
  const scale = 0.5 + (stage * 0.1);
  const color = stage >= 4 ? '#fdba74' : '#fed7aa';
  const h = 140 * scale;

  const wrapper = createSVG('g', { class: 'plant-wrapper' });
  const g = createSVG('g', { transform: `translate(${x}, ${y})`, class: 'plant-group', style: 'transform-origin: 0px 0px; animation-duration: 8s;' });
  
  // Stem (Thick)
  g.appendChild(createSVG('path', { d: `M -3,0 L -2,${-h} L 2,${-h} L 3,0 Z`, fill: '#4b2110' }));
  
  // Leaves (Broad)
  const lGroup = createSVG('g', { class: 'leaf-group', style: 'transform-origin: 0px -30px; animation-duration: 6s;' });
  lGroup.appendChild(createSVG('path', { d: `M 0,${-h*0.3} C -60,${-h*0.2} -50,${-h*0.6} 0,${-h*0.4}`, fill: '#3f160e' }));
  lGroup.appendChild(createSVG('path', { d: `M 0,${-h*0.45} C 50,${-h*0.35} 60,${-h*0.75} 0,${-h*0.55}`, fill: '#3f160e' }));
  g.appendChild(lGroup);

  // Flower (Flame-like)
  if (stage >= 3) {
    const fGroup = createSVG('g', { transform: `translate(0, ${-h})`, class: 'flower-group', style: `color: ${color}` });
    fGroup.appendChild(createSVG('path', { d: `M 0,0 C -30,-20 -20,-60 0,-70 C 20,-60 30,-20 0,0`, fill: '#ea580c', opacity: 0.8 }));
    fGroup.appendChild(createSVG('path', { d: `M 0,0 C -20,-15 -15,-45 0,-55 C 15,-45 20,-15 0,0`, fill: '#f97316', opacity: 0.9 }));
    fGroup.appendChild(createSVG('path', { d: `M 0,0 C -10,-10 -5,-30 0,-40 C 5,-30 10,-10 0,0`, fill: '#fcd34d' }));
    g.appendChild(fGroup);
  }
  wrapper.appendChild(g);
  svg.appendChild(wrapper);
}

// ================== CANVAS ANIMATIONS ==================
function createFog() {
  fogParticles =[];
  for (let i = 0; i < 12; i++) {
    fogParticles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 150 + 100,
      speed: (Math.random() - 0.5) * 0.4,
      opacity: Math.random() * 0.05 + 0.02
    });
  }
}

function createFireflies() {
  fireflies =[];
  for (let i = 0; i < 15; i++) {
    fireflies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * (canvas.height * 0.8),
      size: Math.random() * 2 + 1,
      speedX: (Math.random() - 0.5) * 0.6,
      speedY: (Math.random() - 0.5) * 0.4,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function animateCanvas() {
  const theme = themesData[currentTheme];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Ground
  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
  ctx.fillRect(0, canvas.height - 150, canvas.width, 150);
  
  // Draw fog
  ctx.fillStyle = theme.fog;
  fogParticles.forEach(p => {
    p.x += p.speed;
    if (p.x < -p.size) p.x = canvas.width + p.size;
    if (p.x > canvas.width + p.size) p.x = -p.size;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Draw fireflies
  fireflies.forEach(f => {
    f.x += f.speedX;
    f.y += f.speedY;
    f.twinkle += 0.05;
    const opacity = 0.3 + Math.abs(Math.sin(f.twinkle)) * 0.7;
    
    if (f.x < 0 || f.x > canvas.width) f.speedX *= -1;
    if (f.y < 0 || f.y > canvas.height * 0.8) f.speedY *= -1;
    
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.fillStyle = theme.fly;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = theme.fly;
    ctx.globalAlpha = opacity * 0.3;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  
  animationFrameId = requestAnimationFrame(animateCanvas);
}

// ================== INTERACTIONS & COOLDOWNS ==================
function updateCooldownUI() {
  const now = Date.now();
  ['water', 'talk', 'pet'].forEach(action => {
    const btn = document.getElementById(`btn-${action}`);
    const timerSpan = btn.querySelector('.timer');
    const timeRemaining = activeCooldowns[action] - now;
    
    if (timeRemaining > 0) {
      btn.disabled = true;
      timerSpan.innerText = `(${Math.ceil(timeRemaining / 1000)}s)`;
    } else {
      btn.disabled = false;
      timerSpan.innerText = '';
    }
  });
}

function performAction(action) {
  const now = Date.now();
  if (now < activeCooldowns[action]) return;

  activeCooldowns[action] = now + COOLDOWNS[action];
  let updated = false;

  if (action === 'water') {
    Object.keys(plants).forEach(key => {
      if (plants[key].stage < 5) {
        plants[key].stage++;
        updated = true;
      }
    });
    setStatus("The garden drinks deeply... (+ Growth)");
  } 
  else if (action === 'talk') {
    const msgs =["The plants lean in gently...", "A soft glow spreads through the leaves...", "The garden listens..."];
    setStatus(msgs[Math.floor(Math.random() * msgs.length)]);
  }
  else if (action === 'pet') {
    setStatus("The leaves tremble softly at your touch...");
  }
  
  if (updated) {
    drawSVGPlants();
    updateUI();
  }
  saveToLocalStorage();
}

function renamePlant(key) {
  const newName = prompt(`Give your ${plants[key].name} a new name:`, plants[key].name);
  if (newName && newName.trim().length > 0) {
    plants[key].name = newName.trim().substring(0, 16);
    drawSVGPlants();
    saveToLocalStorage();
    setStatus(`${newName} likes their new name.`);
  }
}

// ================== THEMES & MILESTONES ==================
function setTheme(theme, initial = false) {
  currentTheme = theme;
  localStorage.setItem('grove_theme', theme);
  
  document.querySelectorAll('.theme-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('theme-' + theme).classList.add('active');
  
  const root = document.documentElement;
  const tData = themesData[theme];
  root.style.setProperty('--bg-top', tData.top);
  root.style.setProperty('--bg-bottom', tData.bottom);
  root.style.setProperty('--accent', tData.accent);
  
  if (!initial) {
    setStatus(`Theme changed to ${theme}`);
  }
}

function checkMilestones(totalStage) {
  if (totalStage >= 9 && !milestones.includes('first_bloom')) {
    milestones.push('first_bloom');
    setStatus("✨ First Blooms achieved!");
  }
  if (totalStage === 15 && !milestones.includes('full_bloom')) {
    milestones.push('full_bloom');
    setStatus("🌿 The Grove is in Full Bloom!");
  }
  localStorage.setItem('grove_milestones', JSON.stringify(milestones));
}

// ================== UTILS ==================
function saveToLocalStorage() {
  localStorage.setItem('grove_plants', JSON.stringify(plants));
  localStorage.setItem('grove_lastVisit', lastVisit);
}

function exportGarden() {
  const data = { plants, theme: currentTheme, milestones, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'numas_grove_backup.json';
  a.click();
  setStatus("Garden data exported safely!");
}

function showStats() {
  const totalStage = Object.values(plants).reduce((sum, p) => sum + p.stage, 0);
  alert(`The Grove Stats:
Combined Growth Stage: ${totalStage}/15
Milestones Unlocked: ${milestones.length}
Theme: ${currentTheme.charAt(0).toUpperCase() + currentTheme.slice(1)}

The garden remembers every visit.`);
}

init();

document.addEventListener('keydown', (e) => {
  if (e.key === 'w') document.getElementById('btn-water').click();
  if (e.key === 't') document.getElementById('btn-talk').click();
  if (e.key === 'p') document.getElementById('btn-pet').click();
});
</script>
</body>
</html>
