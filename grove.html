<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Grove · Numa's Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&amp;family=Cinzel:wght@400;500&amp;family=Josefin+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#04060e;}
:root{ --bg:#04060e;--panel:rgba(5,8,22,0.92); --border:rgba(168,159,216,0.14);--border-h:rgba(168,159,216,0.32); --accent:#a89fd8;--accent-d:rgba(168,159,216,0.16); --text:#cdd5ed;--muted:#58697f; }
body.moonlit{--accent:#7eb8f7;--accent-d:rgba(126,184,247,0.15);--border:rgba(126,184,247,0.13);--border-h:rgba(126,184,247,0.30);}
body.ember{--accent:#f0a96a;--accent-d:rgba(240,169,106,0.14);--border:rgba(240,169,106,0.13);--border-h:rgba(240,169,106,0.30);}
body{font-family:'Josefin Sans',sans-serif;color:var(--text);}
.bgcvs{position:fixed;inset:0;pointer-events:none;}
#stars-cvs{z-index:1;}
#forest-svg{position:fixed;bottom:0;left:0;width:100%;height:100%;z-index:2;overflow:visible;pointer-events:none;}
#ff-cvs{z-index:4;}
.sw1,.sw2,.sw3,.sw4,.swb{transform-box:fill-box;transform-origin:50% 100%;}
.sw1{animation:sw1 9s ease-in-out infinite alternate;}
.sw2{animation:sw2 12s ease-in-out infinite alternate;}
.sw3{animation:sw3 7s ease-in-out infinite alternate;}
.sw4{animation:sw4 15s ease-in-out infinite alternate;}
.swb{animation:sw1 19s ease-in-out infinite alternate;}
@keyframes sw1{from{transform:rotate(-.55deg)}to{transform:rotate(.65deg)}}
@keyframes sw2{from{transform:rotate(.30deg)}to{transform:rotate(-.70deg)}}
@keyframes sw3{from{transform:rotate(-.45deg)}to{transform:rotate(.50deg)}}
@keyframes sw4{from{transform:rotate(.25deg)}to{transform:rotate(-.55deg)}}
.psa{animation:psa 7s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:50% 100%;}
.psb{animation:psb 9.5s ease-in-out infinite alternate-reverse;transform-box:fill-box;transform-origin:50% 100%;}
.psc{animation:psc 11.5s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:50% 100%;}
@keyframes psa{from{transform:rotate(-1.5deg)}to{transform:rotate(1.5deg)}}
@keyframes psb{from{transform:rotate(1.4deg)}to{transform:rotate(-1.8deg)}}
@keyframes psc{from{transform:rotate(-1.2deg)}to{transform:rotate(1.4deg)}}
.fog-wrap{position:fixed;inset:0;z-index:3;pointer-events:none;}
.fog{position:absolute;bottom:0;left:-60%;width:220%;border-radius:50%;}
.fog-a{height:260px;filter:blur(36px);animation:fda 26s ease-in-out infinite alternate;bottom:-30px;}
.fog-b{height:190px;filter:blur(55px);animation:fdb 40s ease-in-out infinite alternate;bottom:-10px;}
.fog-c{height:340px;filter:blur(68px);animation:fdc 55s ease-in-out infinite alternate;bottom:-55px;}
.fog-d{height:115px;filter:blur(24px);animation:fdd 19s ease-in-out infinite alternate;bottom:55px;}
@keyframes fda{from{transform:translateX(0) scaleY(1)}to{transform:translateX(9%) scaleY(1.18)}}
@keyframes fdb{from{transform:translateX(-6%) scaleY(.9)}to{transform:translateX(11%) scaleY(1.12)}}
@keyframes fdc{from{transform:translateX(6%) scaleY(1)}to{transform:translateX(-9%) scaleY(1.22)}}
@keyframes fdd{from{transform:translateX(-3%)}to{transform:translateX(7%)}}
.fog-a{background:radial-gradient(ellipse 60% 100% at 50% 100%,rgba(120,145,210,.11) 0%,rgba(100,130,190,.055) 40%,transparent 70%);}
.fog-b{background:radial-gradient(ellipse 70% 100% at 40% 100%,rgba(145,165,215,.07) 0%,transparent 65%);}
.fog-c{background:radial-gradient(ellipse 45% 100% at 25% 100%,rgba(110,135,200,.06) 0%,transparent 60%),radial-gradient(ellipse 45% 100% at 75% 100%,rgba(110,135,200,.06) 0%,transparent 60%);}
.fog-d{background:radial-gradient(ellipse 80% 100% at 60% 100%,rgba(160,175,220,.05) 0%,transparent 70%);}
#app{position:relative;z-index:10;display:flex;flex-direction:column;height:100vh;width:100%;}
header{height:50px;flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;align-items:center;padding:0 16px;gap:11px;}
.logo{font-family:'Cinzel',serif;font-size:1.0rem;font-weight:400;color:var(--text);letter-spacing:.10em;flex-shrink:0;}
.logo em{color:var(--accent);font-style:normal;}
.logo-sub{font-size:.60rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
.hsp{flex:1;}
.mbadge{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);border:1px solid var(--border);background:var(--accent-d);padding:4px 12px;flex-shrink:0;}
.hbtn{font-family:'Josefin Sans',sans-serif;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .22s;flex-shrink:0;}
.hbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-d);}
.main{flex:1;display:flex;overflow:hidden;min-height:0;}
#garden-area{flex:1;position:relative;overflow:hidden;min-width:0;}
#ground-cvs{position:absolute;inset:0;pointer-events:none;z-index:5;}
#plants-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:8;overflow:visible;}
#pcvs{position:absolute;inset:0;pointer-events:none;z-index:9;}
.pname{font-family:'Cinzel',serif;font-size:11px;font-weight:400;letter-spacing:.07em;text-anchor:middle;cursor:pointer;}
.pname:hover{opacity:.65;}
.plvl{font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;fill:#485a6a;text-anchor:middle;}
.sidebar{width:242px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}
.sbsec{padding:12px 13px 10px;border-bottom:1px solid rgba(168,159,216,.055);}
.sbsec:last-child{flex:1;border-bottom:none;}
.sblbl{display:block;font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.abtn{width:100%;margin-bottom:6px;padding:0;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s,color .2s;display:flex;flex-direction:column;}
.abtn:hover:not(:disabled){border-color:var(--border-h);color:var(--text);}
.abtn:disabled{cursor:not-allowed;opacity:.68;}
.abtn:last-child{margin-bottom:0;}
.ainn{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;font-family:'Josefin Sans',sans-serif;font-size:.66rem;letter-spacing:.10em;text-transform:uppercase;}
.axp{font-size:.60rem;color:var(--accent);}
.cdb{height:2px;background:var(--accent-d);position:relative;z-index:1;}
.cdf{height:100%;background:var(--accent);width:0%;}
.prow{border:1px solid var(--border);padding:9px 10px;cursor:pointer;transition:border-color .2s;margin-bottom:5px;}
.prow:hover{border-color:var(--border-h);}
.prow:last-child{margin-bottom:0;}
.prowtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.prowname{font-size:.70rem;letter-spacing:.06em;color:var(--text);}
.prowstage{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;}
.pxpbar{height:2px;background:rgba(168,159,216,.10);margin-bottom:3px;}
.pxpfill{height:100%;transition:width .6s ease;}
.pxptxt{font-size:.58rem;color:var(--muted);letter-spacing:.05em;}
.thrw{display:flex;gap:5px;}
.thbtn{flex:1;padding:7px 0;cursor:pointer;border:1px solid var(--border);background:transparent;font-family:'Josefin Sans',sans-serif;font-size:.60rem;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px;}
.thbtn::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.thbtn[data-t="mist"]::before{background:#a89fd8;}
.thbtn[data-t="moonlit"]::before{background:#7eb8f7;}
.thbtn[data-t="ember"]::before{background:#f0a96a;}
.thbtn:hover{border-color:var(--border-h);color:var(--text);background:var(--accent-d);}
.thbtn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-d);}
.statusbar{height:26px;flex-shrink:0;background:rgba(2,4,10,.92);border-top:1px solid rgba(168,159,216,.06);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 13px;gap:12px;font-size:.58rem;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.ssp{flex:1;}
#toast{position:fixed;bottom:46px;left:50%;z-index:300;transform:translateX(-50%) translateY(8px);background:var(--panel);border:1px solid var(--border);backdrop-filter:blur(20px);padding:11px 22px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.0rem;color:var(--text);text-align:center;max-width:440px;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;white-space:nowrap;}
#toast.up{opacity:1;transform:translateX(-50%) translateY(0);}
#smodal{position:fixed;inset:0;z-index:200;background:rgba(2,4,10,.96);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;}
#smodal.open{display:flex;}
.sbox{max-width:480px;width:100%;border:1px solid var(--border);background:rgba(6,9,22,.96);padding:32px 34px;}
.stitle{font-family:'Cinzel',serif;font-size:1.25rem;font-weight:400;letter-spacing:.10em;color:var(--text);margin-bottom:22px;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(168,159,216,.055);font-size:.70rem;letter-spacing:.06em;}
.srow:last-of-type{border-bottom:none;}
.srl{color:var(--muted);text-transform:uppercase;font-size:.60rem;letter-spacing:.14em;}
.srv{color:var(--text);}
.mlist{margin-top:16px;display:flex;flex-direction:column;gap:5px;max-height:160px;overflow-y:auto;}
.mitem{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.88rem;color:var(--muted);padding:4px 0;border-bottom:1px solid rgba(168,159,216,.04);}
.sclose{margin-top:20px;width:100%;font-family:'Josefin Sans',sans-serif;font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;padding:9px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;}
.sclose:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-d);}
.qtext{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.82rem;line-height:1.7;color:var(--muted);}
@media(max-width:640px){.sidebar{width:195px;}.logo-sub,.mbadge{display:none;}}
@media(max-width:440px){.sidebar{display:none;}}
</style>
</head>
<body>
<canvas id="stars-cvs" class="bgcvs"></canvas>
<canvas id="ff-cvs" class="bgcvs"></canvas>
<svg id="forest-svg" width="100%" height="100%"></svg>
<div class="fog-wrap">
  <div class="fog fog-a"></div>
  <div class="fog fog-b"></div>
  <div class="fog fog-c"></div>
  <div class="fog fog-d"></div>
</div>
<div id="app">
  <header>
    <div class="logo">The <em>Grove</em></div>
    <div class="logo-sub">Numa's Garden</div>
    <div class="hsp"></div>
    <div class="mbadge">Mastery · 3</div>
    <button class="hbtn" onclick="showStats()">Stats</button>
    <button class="hbtn" onclick="doImport()">Import</button>
    <button class="hbtn" onclick="doExport()">Export</button>
  </header>
  <div class="main">
    <div id="garden-area">
      <canvas id="ground-cvs"></canvas>
      <svg id="plants-svg" width="100%" height="100%"></svg>
      <canvas id="pcvs"></canvas>
    </div>
    <div class="sidebar">
      <div class="sbsec">
        <div class="sblbl">Care</div>
        <button class="abtn" id="btn-water" onclick="doAction('water')">
          <div class="ainn"><span>💧 Water</span><span class="axp" id="axp-water">+20 XP</span></div>
          <div class="cdb"><div class="cdf" id="cd-water"></div></div>
        </button>
        <button class="abtn" id="btn-talk" onclick="doAction('talk')">
          <div class="ainn"><span>💬 Talk</span><span class="axp" id="axp-talk">+15 XP</span></div>
          <div class="cdb"><div class="cdf" id="cd-talk"></div></div>
        </button>
        <button class="abtn" id="btn-pet" onclick="doAction('pet')">
          <div class="ainn"><span>✦ Pet</span><span class="axp" id="axp-pet">+10 XP</span></div>
          <div class="cdb"><div class="cdf" id="cd-pet"></div></div>
        </button>
        <button class="abtn" id="btn-sing" onclick="doAction('sing')">
          <div class="ainn"><span>♪ Sing</span><span class="axp" id="axp-sing">+30 XP</span></div>
          <div class="cdb"><div class="cdf" id="cd-sing"></div></div>
        </button>
      </div>
      <div class="sbsec" style="flex:1">
        <div class="sblbl">The Plants</div>
        <div id="plant-list"></div>
      </div>
      <div class="sbsec">
        <div class="sblbl">Atmosphere</div>
        <div class="thrw">
          <button class="thbtn on" data-t="mist" onclick="setTheme('mist')">Mist</button>
          <button class="thbtn" data-t="moonlit" onclick="setTheme('moonlit')">Moon</button>
          <button class="thbtn" data-t="ember" onclick="setTheme('ember')">Ember</button>
        </div>
      </div>
      <div class="sbsec" style="border-bottom:none">
        <p class="qtext" style="padding:4px 0">The grove grows slowly,<br>as all things worth<br>tending do.</p>
      </div>
    </div>
  </div>
  <div class="statusbar">
    <div class="sdot"></div>
    <span id="status-text">The grove is quiet tonight…</span>
    <div class="ssp"></div>
    <span style="color:var(--accent)">3 plants · 12 actions today</span>
  </div>
</div>

<div id="toast"></div>

<div id="smodal">
  <div class="sbox">
    <div class="stitle">The Grove · Records</div>
    <div class="srow"><div class="srl">Mastery Level</div><div class="srv" id="stat-mastery">3</div></div>
    <div class="srow"><div class="srl">Total XP Earned</div><div class="srv" id="stat-xp">1,240</div></div>
    <div class="srow"><div class="srl">Plants Tended</div><div class="srv" id="stat-plants">3 / 3</div></div>
    <div class="srow"><div class="srl">Days Tended</div><div class="srv" id="stat-days">47</div></div>
    <div class="mlist" id="memories-list"></div>
    <button class="sclose" onclick="hideStats()">✕ Close</button>
  </div>
</div>

<script>
/* ── SEEDED PRNG ── */
function mkRand(seed){let s=seed>>>0;return function(){s+=0x6d2b79f5;let t=s;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;};}

/* ── STARS ── */
const sCvs=document.getElementById('stars-cvs'),sCtx=sCvs.getContext('2d');
function buildStars(){const W=sCvs.width=window.innerWidth,H=sCvs.height=window.innerHeight;sCtx.clearRect(0,0,W,H);const r=mkRand(55),n=Math.floor(W*H/1600);for(let i=0;i<n;i++){sCtx.beginPath();sCtx.arc(r()*W,r()*H*.72,r()*.85+.15,0,6.283);sCtx.fillStyle=`hsla(${(200+r()*70)|0},65%,85%,${(r()*.45+.1).toFixed(2)})`;sCtx.fill();}}

/* ── TREES ── */
const NS='http://www.w3.org/2000/svg',fsvg=document.getElementById('forest-svg');
function branch(p,x,y,angle,len,depth,maxD,rand,cfg){if(len<1.2)return;const rad=angle*Math.PI/180,ex=x+len*Math.sin(rad),ey=y-len*Math.cos(rad),t=depth/maxD,sw=Math.max(.35,cfg.tw*Math.pow(1-t*.88,2.5));const ln=document.createElementNS(NS,'line');ln.setAttribute('x1',x.toFixed(1));ln.setAttribute('y1',y.toFixed(1));ln.setAttribute('x2',ex.toFixed(1));ln.setAttribute('y2',ey.toFixed(1));ln.setAttribute('stroke-width',sw.toFixed(2));p.appendChild(ln);if(depth>=maxD)return;const r1=rand(),nb=depth===0?1:depth<2?2:r1<.12?1:r1<.78?2:3,sp=cfg.sp*(1+depth*.12);if(nb===1){branch(p,ex,ey,angle+(rand()-.5)*sp*.35,len*cfg.lf,depth+1,maxD,rand,cfg);}else if(nb===2){const ls=sp*(.42+rand()*.42),rs=sp*(.42+rand()*.42),lean=(rand()-.5)*sp*.12;branch(p,ex,ey,angle-ls+lean,len*cfg.lf*(.8+rand()*.3),depth+1,maxD,rand,cfg);branch(p,ex,ey,angle+rs+lean,len*cfg.lf*(.8+rand()*.3),depth+1,maxD,rand,cfg);}else{const s=sp*(.58+rand()*.28);branch(p,ex,ey,angle-s,len*cfg.lf*(.78+rand()*.28),depth+1,maxD,rand,cfg);branch(p,ex,ey,angle+(rand()-.5)*s*.22,len*cfg.lf*(.68+rand()*.22),depth+1,maxD,rand,cfg);branch(p,ex,ey,angle+s,len*cfg.lf*(.78+rand()*.28),depth+1,maxD,rand,cfg);}}
function addRoots(inner,rand,cfg){const nr=3+Math.floor(rand()*3);for(let i=0;i<nr;i++){const a=(rand()-.5)*80,l=cfg.th*.18+rand()*cfg.th*.12,rad=a*Math.PI/180,ln=document.createElementNS(NS,'line');ln.setAttribute('x1','0');ln.setAttribute('y1','0');ln.setAttribute('x2',(l*Math.sin(rad)).toFixed(1));ln.setAttribute('y2',(l*.45).toFixed(1));ln.setAttribute('stroke-width',(cfg.tw*.55).toFixed(2));inner.appendChild(ln);}}
function makeTree(cfg){const rand=mkRand(cfg.seed),outer=document.createElementNS(NS,'g');outer.setAttribute('transform',`translate(${cfg.x.toFixed(1)},${cfg.y.toFixed(1)})`);const inner=document.createElementNS(NS,'g');inner.setAttribute('class',cfg.sc);inner.setAttribute('stroke',cfg.col);inner.setAttribute('stroke-linecap','round');inner.setAttribute('stroke-linejoin','round');inner.setAttribute('fill','none');addRoots(inner,mkRand(cfg.seed+9999),{tw:cfg.tw,th:cfg.th});branch(inner,0,0,0,cfg.th,0,cfg.maxD,rand,cfg);outer.appendChild(inner);fsvg.appendChild(outer);}
function buildForest(){fsvg.innerHTML='';const W=window.innerWidth,H=window.innerHeight,b=H,bg='#06091a',fg='#030508';[{x:W*.29,y:b,th:H*.21,sp:24,lf:.73,maxD:7,tw:7,sc:'swb',seed:91,col:bg},{x:W*.44,y:b,th:H*.18,sp:22,lf:.74,maxD:7,tw:6,sc:'swb',seed:92,col:bg},{x:W*.58,y:b,th:H*.20,sp:26,lf:.72,maxD:7,tw:7,sc:'swb',seed:93,col:bg},{x:W*.69,y:b,th:H*.17,sp:23,lf:.73,maxD:6,tw:5,sc:'swb',seed:94,col:bg}].forEach(makeTree);[{x:W*-.03,y:b,th:H*.55,sp:27,lf:.69,maxD:11,tw:23,sc:'sw1',seed:1001,col:fg},{x:W*.10,y:b,th:H*.48,sp:36,lf:.65,maxD:10,tw:15,sc:'sw3',seed:2002,col:fg},{x:W*.20,y:b,th:H*.40,sp:31,lf:.71,maxD:10,tw:16,sc:'sw2',seed:3003,col:fg},{x:W*.31,y:b,th:H*.28,sp:29,lf:.72,maxD:9,tw:10,sc:'sw4',seed:4004,col:fg},{x:W*.67,y:b,th:H*.30,sp:27,lf:.72,maxD:9,tw:11,sc:'sw2',seed:5005,col:fg},{x:W*.78,y:b,th:H*.40,sp:30,lf:.70,maxD:10,tw:15,sc:'sw1',seed:6006,col:fg},{x:W*.89,y:b,th:H*.52,sp:25,lf:.68,maxD:11,tw:21,sc:'sw3',seed:7007,col:fg},{x:W*1.02,y:b,th:H*.44,sp:29,lf:.70,maxD:10,tw:17,sc:'sw4',seed:8008,col:fg}].forEach(makeTree);}

/* ── FIREFLIES ── */
const ffCvs=document.getElementById('ff-cvs'),ffCtx=ffCvs.getContext('2d');let flies=[],ffRaf;

/* ══════════════════════════════════ GAME LOGIC ══════════════════════════════════ */
const pSvg = document.getElementById('plants-svg');
const pList = document.getElementById('plant-list');
const pcvs = document.getElementById('pcvs');
const pctx = pcvs.getContext('2d');

let plants = [
  {id:1, type:'moonflower', stage:2, xp:45, name:'Moonflower'},
  {id:2, type:'starbloom', stage:3, xp:120, name:'Starbloom'},
  {id:3, type:'emberleaf', stage:1, xp:30, name:'Emberleaf'}
];

let cooldowns = {water:0, talk:0, pet:0, sing:0};
let memories = [];
let cdInterval = null;

const PLANT_META = {
  moonflower: {emoji:'🌙', color:'#a78bfa', xpPerStage:[0,80,160,280,450]},
  starbloom: {emoji:'✧', color:'#38bdf8', xpPerStage:[0,70,150,270,420]},
  emberleaf: {emoji:'🔥', color:'#f97316', xpPerStage:[0,90,170,290,480]}
};

function getXpNeeded(type, stage) {
  const meta = PLANT_META[type];
  return meta.xpPerStage[Math.min(stage, 5)] || 500;
}

function getTotalXp(p) {
  const meta = PLANT_META[p.type];
  let total = 0;
  for(let s=1; s<p.stage; s++) total += meta.xpPerStage[s];
  return total + p.xp;
}

function saveGame() {
  const data = {
    plants: plants.map(p => ({...p})),
    memories: memories.slice(-12),
    theme: document.body.classList.contains('moonlit') ? 'moonlit' : document.body.classList.contains('ember') ? 'ember' : 'mist',
    lastSaved: Date.now()
  };
  localStorage.setItem('numa_grove_save', JSON.stringify(data));
}

function loadGame() {
  const saved = localStorage.getItem('numa_grove_save');
  if(!saved) return false;
  try {
    const data = JSON.parse(saved);
    if(data.plants) plants = data.plants;
    if(data.memories) memories = data.memories;
    if(data.theme) setTheme(data.theme, true);
    return true;
  } catch(e){ return false; }
}

function updateStatus() {
  const el = document.getElementById('status-text');
  const msgs = [
    'The grove is quiet tonight…',
    'A gentle breeze moves the leaves.',
    'Fireflies dance between the trees.',
    'The plants seem content.',
    'Moonlight filters through the canopy.',
    'The soil feels alive underfoot.'
  ];
  el.textContent = msgs[Math.floor(Math.random()*msgs.length)];
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('up');
  setTimeout(() => t.classList.remove('up'), 2600);
}

function triggerParticles(x, y, color = '#a89fd8') {
  const W = pcvs.width = pcvs.parentElement.clientWidth;
  const H = pcvs.height = pcvs.parentElement.clientHeight;
  pctx.clearRect(0,0,W,H);
  
  const parts = [];
  for(let i=0; i<18; i++) {
    parts.push({
      x: x + (Math.random()-0.5)*40,
      y: y - 20 + (Math.random()-0.5)*30,
      vx: (Math.random()-0.5)*2.2,
      vy: -1.8 - Math.random()*1.8,
      life: 28 + Math.random()*18,
      size: 2.5 + Math.random()*2.2,
      col: color
    });
  }
  
  let raf;
  function anim() {
    pctx.clearRect(0,0,W,H);
    let alive = false;
    parts.forEach((pt, idx) => {
      if(pt.life <= 0) return;
      alive = true;
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.vy += 0.08;
      pt.life -= 1;
      const alpha = Math.max(0, pt.life / 40);
      pctx.save();
      pctx.globalAlpha = alpha * 0.9;
      pctx.fillStyle = pt.col;
      pctx.beginPath();
      pctx.arc(pt.x, pt.y, pt.size * (pt.life/30 + 0.3), 0, Math.PI*2);
      pctx.fill();
      pctx.restore();
    });
    if(alive) raf = requestAnimationFrame(anim);
    else pctx.clearRect(0,0,W,H);
  }
  anim();
  setTimeout(() => { if(raf) cancelAnimationFrame(raf); pctx.clearRect(0,0,W,H); }, 1400);
}

function renderPlants() {
  pSvg.innerHTML = '';
  const rect = pSvg.getBoundingClientRect();
  const W = rect.width || 900;
  const H = rect.height || 620;
  
  const positions = [
    {x: W * 0.23, y: H * 0.81},
    {x: W * 0.51, y: H * 0.84},
    {x: W * 0.78, y: H * 0.79}
  ];
  
  plants.forEach((p, i) => {
    const g = document.createElementNS(NS, 'g');
    g.setAttribute('transform', `translate(${positions[i].x}, ${positions[i].y})`);
    
    // plant shadow
    const shadow = document.createElementNS(NS, 'ellipse');
    shadow.setAttribute('cx', '0');
    shadow.setAttribute('cy', '18');
    shadow.setAttribute('rx', '22');
    shadow.setAttribute('ry', '6');
    shadow.setAttribute('fill', 'rgba(2,4,12,0.35)');
    g.appendChild(shadow);
    
    // plant svg content
    let svgContent = '';
    if(p.type === 'moonflower') svgContent = moonflowerSVG(p.stage);
    else if(p.type === 'starbloom') svgContent = starbloomSVG(p.stage);
    else svgContent = emberleafSVG(p.stage);
    
    const plantGroup = document.createElementNS(NS, 'g');
    plantGroup.innerHTML = svgContent;
    g.appendChild(plantGroup);
    
    // name label
    const nameTxt = document.createElementNS(NS, 'text');
    nameTxt.setAttribute('class', 'pname');
    nameTxt.setAttribute('y', '-52');
    nameTxt.setAttribute('fill', PLANT_META[p.type].color);
    nameTxt.textContent = p.name;
    nameTxt.onclick = () => {
      showToast(`${p.name} whispers its thanks.`);
      triggerParticles(positions[i].x, positions[i].y - 30, PLANT_META[p.type].color);
    };
    g.appendChild(nameTxt);
    
    // level badge
    const lvlTxt = document.createElementNS(NS, 'text');
    lvlTxt.setAttribute('class', 'plvl');
    lvlTxt.setAttribute('y', '-36');
    lvlTxt.textContent = `STAGE ${p.stage}`;
    g.appendChild(lvlTxt);
    
    pSvg.appendChild(g);
  });
}

function updatePlantList() {
  pList.innerHTML = '';
  plants.forEach(p => {
    const meta = PLANT_META[p.type];
    const needed = getXpNeeded(p.type, p.stage);
    const pct = Math.min(100, Math.floor((p.xp / needed) * 100));
    
    const row = document.createElement('div');
    row.className = 'prow';
    row.innerHTML = `
      <div class="prowtop">
        <div>
          <span class="prowname">${meta.emoji} ${p.name}</span>
          <span class="prowstage" style="color:${meta.color}">STAGE ${p.stage}</span>
        </div>
        <div class="pxptxt">${p.xp} / ${needed} XP</div>
      </div>
      <div class="pxpbar"><div class="pxpfill" style="width:${pct}%;background:${meta.color}"></div></div>
    `;
    row.onclick = () => {
      showToast(`${p.name} pulses with quiet energy.`);
      triggerParticles(200 + Math.random()*300, 380, meta.color);
    };
    pList.appendChild(row);
  });
}

function updateCooldownUI() {
  const now = Date.now();
  const types = ['water','talk','pet','sing'];
  const times = {water:8000, talk:12000, pet:6500, sing:16000};
  
  types.forEach(t => {
    const bar = document.getElementById(`cd-${t}`);
    const btn = document.getElementById(`btn-${t}`);
    if(!bar || !btn) return;
    
    if(now >= cooldowns[t]) {
      bar.style.width = '0%';
      btn.disabled = false;
    } else {
      const total = times[t];
      const remaining = Math.max(0, cooldowns[t] - now);
      const pct = (remaining / total) * 100;
      bar.style.width = pct + '%';
      btn.disabled = true;
    }
  });
}

function startCooldownLoop() {
  if(cdInterval) clearInterval(cdInterval);
  cdInterval = setInterval(() => {
    updateCooldownUI();
  }, 120);
}

function doAction(type) {
  const now = Date.now();
  if(now < cooldowns[type]) return;
  
  const times = {water:8000, talk:12000, pet:6500, sing:16000};
  const gains = {water:20, talk:15, pet:10, sing:30};
  
  cooldowns[type] = now + times[type];
  updateCooldownUI();
  
  const gain = gains[type];
  let anyGrew = false;
  
  plants.forEach(p => {
    p.xp += gain;
    const needed = getXpNeeded(p.type, p.stage);
    
    if(p.xp >= needed && p.stage < 5) {
      p.xp -= needed;
      p.stage++;
      anyGrew = true;
      
      const msg = `${p.name} has grown to Stage ${p.stage}!`;
      showToast(msg);
      memories.push(`${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})} — ${msg}`);
      
      // special effects per type
      if(p.type === 'emberleaf') {
        setTimeout(() => triggerParticles(620, 410, '#f97316'), 180);
      } else if(p.type === 'starbloom') {
        setTimeout(() => triggerParticles(460, 395, '#38bdf8'), 120);
      }
    }
  });
  
  renderPlants();
  updatePlantList();
  
  if(anyGrew) {
    // update mastery badge if needed
    const sumStages = plants.reduce((a,p)=>a+p.stage,0);
    const newMastery = Math.max(3, Math.floor((sumStages - 3) / 2) + 3);
    document.querySelector('.mbadge').textContent = `Mastery · ${newMastery}`;
    
    // bonus particle burst in center
    setTimeout(() => {
      const centerX = pSvg.getBoundingClientRect().width * 0.5;
      triggerParticles(centerX, 280, '#a89fd8');
    }, 300);
  }
  
  // random ambient toast sometimes
  if(Math.random() < 0.18) {
    setTimeout(() => showToast('The grove responds to your care.'), 900);
  }
  
  saveGame();
}

function setTheme(theme, silent = false) {
  document.body.classList.remove('moonlit', 'ember');
  
  if(theme === 'moonlit') document.body.classList.add('moonlit');
  else if(theme === 'ember') document.body.classList.add('ember');
  
  document.querySelectorAll('.thbtn').forEach(b => {
    b.classList.toggle('on', b.dataset.t === theme);
  });
  
  if(!silent) {
    const msgs = {
      mist: 'The mist settles gently over the grove.',
      moonlit: 'Moonlight bathes the garden in silver.',
      ember: 'A warm glow kindles in the embers.'
    };
    showToast(msgs[theme] || 'Atmosphere shifted.');
  }
  
  localStorage.setItem('numa_grove_theme', theme);
}

function showStats() {
  const modal = document.getElementById('smodal');
  const totalXp = plants.reduce((sum, p) => sum + getTotalXp(p), 0);
  const sumStages = plants.reduce((a,p)=>a + p.stage, 0);
  const mastery = Math.max(3, Math.floor((sumStages - 3) / 2) + 3);
  
  document.getElementById('stat-mastery').textContent = mastery;
  document.getElementById('stat-xp').textContent = totalXp.toLocaleString();
  document.getElementById('stat-plants').textContent = `${plants.length} / 3`;
  document.getElementById('stat-days').textContent = Math.floor((Date.now() - 1740000000000) / 86400000) + 12; // fake days
  
  const memList = document.getElementById('memories-list');
  memList.innerHTML = '';
  
  if(memories.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'mitem';
    empty.textContent = 'No records yet. Tend the plants to begin the story.';
    memList.appendChild(empty);
  } else {
    memories.slice(-8).reverse().forEach(m => {
      const item = document.createElement('div');
      item.className = 'mitem';
      item.textContent = m;
      memList.appendChild(item);
    });
  }
  
  modal.style.display = 'flex';
  modal.classList.add('open');
}

function hideStats() {
  const modal = document.getElementById('smodal');
  modal.classList.remove('open');
  setTimeout(() => { modal.style.display = 'none'; }, 180);
}

function doExport() {
  const data = {
    plants: plants.map(p => ({id:p.id, type:p.type, stage:p.stage, xp:p.xp, name:p.name})),
    memories: memories,
    theme: document.body.classList.contains('moonlit') ? 'moonlit' : document.body.classList.contains('ember') ? 'ember' : 'mist',
    exportedAt: new Date().toISOString()
  };
  const json = JSON.stringify(data, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    showToast('Garden data copied to clipboard!');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = json;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Garden data copied!');
  });
}

function doImport() {
  const input = prompt('Paste your exported garden JSON here:');
  if(!input || input.trim() === '') return;
  
  try {
    const data = JSON.parse(input.trim());
    
    if(data.plants && Array.isArray(data.plants)) {
      plants = data.plants.map(p => ({
        id: p.id || Date.now(),
        type: p.type || 'moonflower',
        stage: Math.max(1, Math.min(5, p.stage || 1)),
        xp: Math.max(0, p.xp || 0),
        name: p.name || PLANT_META[p.type || 'moonflower'].emoji + ' ' + (p.type || 'Moonflower')
      }));
    }
    
    if(data.memories && Array.isArray(data.memories)) {
      memories = data.memories.slice(-15);
    }
    
    if(data.theme) {
      setTheme(data.theme, true);
    }
    
    renderPlants();
    updatePlantList();
    updateCooldownUI();
    showToast('Garden successfully restored!');
    saveGame();
    
  } catch(e) {
    showToast('Invalid garden data. Please check the JSON.');
  }
}

function initPlantList() {
  // already handled in updatePlantList
}

function initGame() {
  // load save if exists
  const loaded = loadGame();
  
  // initial render
  renderPlants();
  updatePlantList();
  
  // start cooldown updater
  startCooldownLoop();
  updateCooldownUI();
  
  // random status updates
  setInterval(updateStatus, 38000);
  
  // initial ambient particle
  setTimeout(() => {
    const w = pSvg.getBoundingClientRect().width;
    triggerParticles(w * 0.3, 310, '#a89fd8');
  }, 1400);
  
  // keyboard shortcuts
  document.addEventListener('keydown', e => {
    if(e.key === '?') { e.preventDefault(); showStats(); }
    if(e.key.toLowerCase() === 'w') { e.preventDefault(); doAction('water'); }
    if(e.key.toLowerCase() === 't') { e.preventDefault(); doAction('talk'); }
    if(e.key.toLowerCase() === 'p') { e.preventDefault(); doAction('pet'); }
    if(e.key.toLowerCase() === 's') { e.preventDefault(); doAction('sing'); }
  });
  
  // resize handler
  let resizeTO;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTO);
    resizeTO = setTimeout(() => {
      initBg();
      drawGround();
      renderPlants();
    }, 180);
  });
  
  // initial bg and ground
  initBg();
  drawGround();
  
  // welcome toast
  if(!loaded) {
    setTimeout(() => {
      showToast('Welcome to Numa\'s Garden. Tend with care.');
    }, 800);
  } else {
    setTimeout(() => {
      showToast('Welcome back to the grove.');
    }, 600);
  }
  
  // Easter egg: click header logo for special effect
  const logo = document.querySelector('.logo');
  if(logo) {
    logo.style.cursor = 'pointer';
    logo.onclick = () => {
      const w = pSvg.getBoundingClientRect().width;
      triggerParticles(w * 0.5, 180, '#a89fd8');
      showToast('The ancient grove remembers you.');
      plants.forEach((p,i) => {
        setTimeout(() => {
          p.xp = Math.min(p.xp + 8, getXpNeeded(p.type, p.stage) - 1);
          renderPlants();
          updatePlantList();
        }, i * 180);
      });
    };
  }
  
  // final touch: make sure mastery badge reflects current
  const sumStages = plants.reduce((a,p)=>a+p.stage,0);
  const currentMastery = Math.max(3, Math.floor((sumStages - 3) / 2) + 3);
  document.querySelector('.mbadge').textContent = `Mastery · ${currentMastery}`;
  
  console.log('%c[Numa\'s Garden] Grove initialized successfully.', 'color:#58697f');
}

// Boot everything
initGame();
</script>
