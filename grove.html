<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grove • Numa's Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c14;
  --accent: #c4b5fd;
  --text: #e0e7ff;
  --muted: #8b9dc3;
  --panel: rgba(15, 17, 28, 0.95);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh;
  background: #0a0c14;
  color: var(--text);
  font-family: 'Space Grotesk', system_ui, sans-serif;
  overflow: hidden;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  height: 56px;
  background: var(--panel);
  border-bottom: 1px solid rgba(196, 181, 253, 0.2);
  display: flex;
  align-items: center;
  padding: 0 20px;
  z-index: 100;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  color: #e0e7ff;
  letter-spacing: -0.5px;
}
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}
.garden-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #05070f;
  position: relative;
  overflow: hidden;
}
#garden-canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}
#plants-svg {
  position: relative;
  z-index: 10;
  width: 820px;
  height: 620px;
}
.sidebar {
  width: 240px;
  background: var(--panel);
  border-left: 1px solid rgba(196, 181, 253, 0.15);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  z-index: 50;
}
.action-btn {
  background: rgba(196, 181, 253, 0.1);
  border: 1px solid rgba(196, 181, 253, 0.3);
  color: #c7d2fe;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.action-btn:hover {
  background: rgba(196, 181, 253, 0.2);
  border-color: #c4b5fd;
}
.theme-btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(196, 181, 253, 0.2);
  background: rgba(196, 181, 253, 0.05);
  color: #c7d2fe;
  cursor: pointer;
  font-size: 0.85rem;
}
.theme-btn.active {
  background: rgba(196, 181, 253, 0.3);
  border-color: #c4b5fd;
}
.status {
  height: 32px;
  background: #05070f;
  border-top: 1px solid rgba(196, 181, 253, 0.1);
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 0.75rem;
  color: var(--muted);
}
.plant-label {
  position: absolute;
  font-size: 0.75rem;
  color: #c4b5fd;
  text-shadow: 0 0 8px rgba(0,0,0,0.8);
  pointer-events: none;
  z-index: 20;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display: flex; align-items: center; gap: 16px;">
      <div class="logo">The Grove</div>
      <div style="color: #6b7280; font-size: 0.85rem;">Numa's Quiet Place</div>
    </div>
    <div style="margin-left: auto; display: flex; gap: 12px;">
      <button onclick="showStats()" style="background: none; border: 1px solid rgba(196, 181, 253, 0.3); color: #c7d2fe; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;">Stats</button>
      <button onclick="exportGarden()" style="background: #c4b5fd; color: #0a0c14; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.85rem;">Export</button>
    </div>
  </header>

  <div class="main">
    <div class="garden-container" id="garden-container">
      <canvas id="garden-canvas" width="900" height="700"></canvas>
      
      <!-- Plants Container -->
      <svg id="plants-svg" width="820" height="620" style="position: absolute; z-index: 10;"></svg>
      
      <!-- Plant Labels -->
      <div id="label-moonflower" class="plant-label" style="left: 180px; top: 420px;">Moonflower</div>
      <div id="label-star" class="plant-label" style="left: 420px; top: 380px;">Starbloom</div>
      <div id="label-ember" class="plant-label" style="left: 620px; top: 430px;">Emberleaf</div>
    </div>

    <div class="sidebar">
      <div>
        <h4 style="margin-bottom: 10px; color: #c4b5fd;">Care for the Grove</h4>
        
        <button onclick="waterAll()" class="action-btn">💧 Water the Garden</button>
        <button onclick="talkToPlants()" class="action-btn">💬 Talk to the Plants</button>
        <button onclick="petPlants()" class="action-btn">✨ Pet the Leaves</button>
        
        <div style="margin-top: 16px;">
          <h4 style="margin-bottom: 8px; color: #c4b5fd;">Themes</h4>
          <div onclick="setTheme('mist')" class="theme-btn active" id="theme-mist">Deep Mist</div>
          <div onclick="setTheme('moonlit')" class="theme-btn" id="theme-moonlit">Moonlit</div>
          <div onclick="setTheme('ember')" class="theme-btn" id="theme-ember">Ember</div>
        </div>
      </div>
      
      <div style="margin-top: auto; font-size: 0.75rem; color: #6b7280; line-height: 1.4;">
        The garden grows with time and care.<br>
        Come back often.
      </div>
    </div>
  </div>

  <div class="status">
    <span id="status">The Grove is quiet tonight...</span>
    <span style="margin-left: auto;" id="growth">Growth: 0%</span>
  </div>
</div>

<script>
// ================== STATE ==================
let plants = {
  moonflower: { stage: 1, health: 100, name: "Moonflower" },
  star: { stage: 1, health: 100, name: "Starbloom" },
  ember: { stage: 1, health: 100, name: "Emberleaf" }
};

let lastVisit = localStorage.getItem('grove_lastVisit') || Date.now();
let totalGrowth = parseInt(localStorage.getItem('grove_totalGrowth')) || 0;
let currentTheme = localStorage.getItem('grove_theme') || 'mist';
let milestones = JSON.parse(localStorage.getItem('grove_milestones') || '[]');

const canvas = document.getElementById('garden-canvas');
const ctx = canvas.getContext('2d');
let fogParticles = [];
let fireflies = [];

// ================== INITIALIZE ==================
function init() {
  // Load saved plants
  const savedPlants = localStorage.getItem('grove_plants');
  if (savedPlants) plants = JSON.parse(savedPlants);
  
  // Calculate passive growth since last visit
  calculatePassiveGrowth();
  
  // Draw everything
  drawGarden();
  createFog();
  createFireflies();
  animate();
  
  // Update UI
  updateUI();
  setTheme(currentTheme, true);
  
  // Auto-save every 30 seconds
  setInterval(saveToLocalStorage, 30000);
  
  // Welcome message
  setTimeout(() => {
    document.getElementById('status').innerText = "The garden remembers your last visit...";
    setTimeout(() => {
      document.getElementById('status').innerText = "The Grove is quiet tonight...";
    }, 4000);
  }, 1500);
}

function calculatePassiveGrowth() {
  const now = Date.now();
  const hoursPassed = (now - lastVisit) / (1000 * 60 * 60);
  
  if (hoursPassed > 0.5) {
    const growthAmount = Math.floor(hoursPassed * 3);
    totalGrowth = Math.min(100, totalGrowth + growthAmount);
    
    // Grow plants based on time passed
    Object.keys(plants).forEach(key => {
      if (plants[key].stage < 5) {
        plants[key].stage = Math.min(5, plants[key].stage + Math.floor(hoursPassed / 8));
      }
    });
    
    document.getElementById('status').innerText = `The garden grew while you were away... (+${growthAmount} growth)`;
  }
  
  lastVisit = now;
  localStorage.setItem('grove_lastVisit', lastVisit);
}

// ================== DRAW GARDEN ==================
function drawGarden() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#05070f');
  bg.addColorStop(1, '#0a0c14');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Subtle ground
  ctx.fillStyle = 'rgba(15, 17, 28, 0.6)';
  ctx.fillRect(0, 520, canvas.width, 180);
  
  // Draw plants
  drawPlant('moonflower', 180, 380, plants.moonflower.stage);
  drawPlant('star', 420, 340, plants.star.stage);
  drawPlant('ember', 620, 390, plants.ember.stage);
  
  // Update labels
  updatePlantLabels();
}

function drawPlant(type, x, y, stage) {
  const svg = document.getElementById('plants-svg');
  let plantGroup = document.getElementById(`plant-${type}`);
  
  if (!plantGroup) {
    plantGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
    plantGroup.id = `plant-${type}`;
    svg.appendChild(plantGroup);
  }
  
  plantGroup.innerHTML = '';
  
  const scale = stage / 5;
  const color = getPlantColor(type, stage);
  
  if (type === 'moonflower') {
    // Moonflower - elegant, glowing purple-white
    const stem = document.createElementNS("http://www.w3.org/2000/svg", "path");
    stem.setAttribute("d", `M${x},${y + 80} Q${x - 5},${y + 40} ${x},${y}`);
    stem.setAttribute("stroke", "#4a5568");
    stem.setAttribute("stroke-width", "4");
    stem.setAttribute("fill", "none");
    plantGroup.appendChild(stem);
    
    // Leaves
    const leaf1 = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
    leaf1.setAttribute("cx", x - 18);
    leaf1.setAttribute("cy", y + 55);
    leaf1.setAttribute("rx", 22 * scale);
    leaf1.setAttribute("ry", 8 * scale);
    leaf1.setAttribute("fill", "#2d3748");
    leaf1.setAttribute("transform", `rotate(-35 ${x - 18} ${y + 55})`);
    plantGroup.appendChild(leaf1);
    
    const leaf2 = leaf1.cloneNode(true);
    leaf2.setAttribute("cx", x + 18);
    leaf2.setAttribute("cy", y + 50);
    leaf2.setAttribute("transform", `rotate(35 ${x + 18} ${y + 50})`);
    plantGroup.appendChild(leaf2);
    
    // Flower
    if (stage >= 3) {
      const flower = document.createElementNS("http://www.w3.org/2000/svg", "g");
      flower.setAttribute("transform", `translate(${x},${y - 5})`);
      
      // Petals
      for (let i = 0; i < 6; i++) {
        const petal = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        petal.setAttribute("cx", 0);
        petal.setAttribute("cy", -18);
        petal.setAttribute("rx", 8);
        petal.setAttribute("ry", 18);
        petal.setAttribute("fill", color);
        petal.setAttribute("transform", `rotate(${i * 60})`);
        flower.appendChild(petal);
      }
      
      // Center
      const center = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      center.setAttribute("cx", 0);
      center.setAttribute("cy", 0);
      center.setAttribute("r", 7);
      center.setAttribute("fill", "#fef3c7");
      flower.appendChild(center);
      
      plantGroup.appendChild(flower);
    }
  }
  
  else if (type === 'star') {
    // Starbloom - bright, star-like
    const stem = document.createElementNS("http://www.w3.org/2000/svg", "path");
    stem.setAttribute("d", `M${x},${y + 90} Q${x + 8},${y + 45} ${x},${y}`);
    stem.setAttribute("stroke", "#4a5568");
    stem.setAttribute("stroke-width", "3.5");
    stem.setAttribute("fill", "none");
    plantGroup.appendChild(stem);
    
    // Leaves
    const leaf = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
    leaf.setAttribute("cx", x - 22);
    leaf.setAttribute("cy", y + 60);
    leaf.setAttribute("rx", 18 * scale);
    leaf.setAttribute("ry", 7 * scale);
    leaf.setAttribute("fill", "#2d3748");
    leaf.setAttribute("transform", `rotate(-40 ${x - 22} ${y + 60})`);
    plantGroup.appendChild(leaf);
    
    const leaf2 = leaf.cloneNode(true);
    leaf2.setAttribute("cx", x + 22);
    leaf2.setAttribute("cy", y + 55);
    leaf2.setAttribute("transform", `rotate(40 ${x + 22} ${y + 55})`);
    plantGroup.appendChild(leaf2);
    
    // Flower
    if (stage >= 3) {
      const flower = document.createElementNS("http://www.w3.org/2000/svg", "g");
      flower.setAttribute("transform", `translate(${x},${y - 8})`);
      
      // Star petals
      for (let i = 0; i < 5; i++) {
        const petal = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        const points = `${0},${-22} ${-8},${-8} ${8},${-8}`;
        petal.setAttribute("points", points);
        petal.setAttribute("fill", color);
        petal.setAttribute("transform", `rotate(${i * 72})`);
        flower.appendChild(petal);
      }
      
      const center = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      center.setAttribute("cx", 0);
      center.setAttribute("cy", 0);
      center.setAttribute("r", 6);
      center.setAttribute("fill", "#fef08c");
      flower.appendChild(center);
      
      plantGroup.appendChild(flower);
    }
  }
  
  else if (type === 'ember') {
    // Emberleaf - warm, resilient
    const stem = document.createElementNS("http://www.w3.org/2000/svg", "path");
    stem.setAttribute("d", `M${x},${y + 85} Q${x - 6},${y + 42} ${x},${y}`);
    stem.setAttribute("stroke", "#4a5568");
    stem.setAttribute("stroke-width", "4.5");
    stem.setAttribute("fill", "none");
    plantGroup.appendChild(stem);
    
    // Large leaves
    const leaf = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
    leaf.setAttribute("cx", x - 25);
    leaf.setAttribute("cy", y + 52);
    leaf.setAttribute("rx", 26 * scale);
    leaf.setAttribute("ry", 10 * scale);
    leaf.setAttribute("fill", "#374151");
    leaf.setAttribute("transform", `rotate(-30 ${x - 25} ${y + 52})`);
    plantGroup.appendChild(leaf);
    
    const leaf2 = leaf.cloneNode(true);
    leaf2.setAttribute("cx", x + 25);
    leaf2.setAttribute("cy", y + 48);
    leaf2.setAttribute("transform", `rotate(30 ${x + 25} ${y + 48})`);
    plantGroup.appendChild(leaf2);
    
    // Flower
    if (stage >= 3) {
      const flower = document.createElementNS("http://www.w3.org/2000/svg", "g");
      flower.setAttribute("transform", `translate(${x},${y - 6})`);
      
      const petal = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
      petal.setAttribute("cx", 0);
      petal.setAttribute("cy", -14);
      petal.setAttribute("rx", 11);
      petal.setAttribute("ry", 16);
      petal.setAttribute("fill", color);
      flower.appendChild(petal);
      
      const center = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      center.setAttribute("cx", 0);
      center.setAttribute("cy", -2);
      center.setAttribute("r", 8);
      center.setAttribute("fill", "#fef08c");
      flower.appendChild(center);
      
      plantGroup.appendChild(flower);
    }
  }
}

function getPlantColor(type, stage) {
  if (type === 'moonflower') return stage >= 4 ? '#e0e7ff' : '#c4b5fd';
  if (type === 'star') return stage >= 4 ? '#fef08c' : '#a5f3fc';
  if (type === 'ember') return stage >= 4 ? '#fdba74' : '#fed7aa';
  return '#c4b5fd';
}

function updatePlantLabels() {
  const labels = {
    moonflower: document.getElementById('label-moonflower'),
    star: document.getElementById('label-star'),
    ember: document.getElementById('label-ember')
  };
  
  Object.keys(plants).forEach(key => {
    const label = labels[key];
    if (label) {
      label.innerText = plants[key].name;
      label.style.opacity = plants[key].stage >= 2 ? '1' : '0.4';
    }
  });
}

// ================== ANIMATIONS ==================
function createFog() {
  fogParticles = [];
  for (let i = 0; i < 9; i++) {
    fogParticles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 140 + 80,
      speed: (Math.random() - 0.5) * 0.3,
      opacity: Math.random() * 0.09 + 0.05
    });
  }
}

function createFireflies() {
  fireflies = [];
  for (let i = 0; i < 14; i++) {
    fireflies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * (canvas.height * 0.7),
      size: Math.random() * 2.5 + 1.2,
      speedX: (Math.random() - 0.5) * 0.8,
      speedY: (Math.random() - 0.5) * 0.5,
      opacity: Math.random() * 0.7 + 0.3,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#05070f');
  bg.addColorStop(1, '#0a0c14');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw fog
  ctx.fillStyle = 'rgba(180, 200, 255, 0.06)';
  fogParticles.forEach(p => {
    p.x += p.speed;
    if (p.x < -p.size) p.x = canvas.width + p.size;
    if (p.x > canvas.width + p.size) p.x = -p.size;
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Draw fireflies
  fireflies.forEach(f => {
    f.x += f.speedX;
    f.y += f.speedY;
    f.twinkle += 0.08;
    f.opacity = 0.4 + Math.sin(f.twinkle) * 0.5;
    
    if (f.x < 0 || f.x > canvas.width) f.speedX *= -1;
    if (f.y < 0 || f.y > canvas.height * 0.75) f.speedY *= -1;
    
    ctx.save();
    ctx.globalAlpha = f.opacity;
    ctx.fillStyle = '#fef08c';
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fill();
    
    // Glow
    ctx.fillStyle = 'rgba(254, 240, 140, 0.4)';
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  
  // Redraw plants on top
  drawGarden();
  
  requestAnimationFrame(animate);
}

// ================== CARE ACTIONS ==================
function waterAll() {
  Object.keys(plants).forEach(key => {
    if (plants[key].stage < 5) {
      plants[key].stage = Math.min(5, plants[key].stage + 1);
    }
    plants[key].health = Math.min(100, plants[key].health + 15);
  });
  
  document.getElementById('status').innerText = "The garden drinks deeply...";
  setTimeout(() => {
    document.getElementById('status').innerText = "The Grove feels refreshed.";
  }, 2500);
  
  drawGarden();
  saveToLocalStorage();
  checkMilestones();
}

function talkToPlants() {
  const messages = [
    "The plants lean in gently...",
    "A soft glow spreads through the leaves...",
    "The garden seems to listen...",
    "Fireflies dance a little brighter..."
  ];
  
  document.getElementById('status').innerText = messages[Math.floor(Math.random() * messages.length)];
  
  // Boost all plants slightly
  Object.keys(plants).forEach(key => {
    plants[key].health = Math.min(100, plants[key].health + 8);
  });
  
  setTimeout(() => {
    document.getElementById('status').innerText = "The Grove is listening...";
  }, 3000);
  
  drawGarden();
  saveToLocalStorage();
}

function petPlants() {
  document.getElementById('status').innerText = "The leaves tremble softly...";
  
  Object.keys(plants).forEach(key => {
    plants[key].health = Math.min(100, plants[key].health + 12);
  });
  
  setTimeout(() => {
    document.getElementById('status').innerText = "The garden feels your touch.";
  }, 2200);
  
  drawGarden();
  saveToLocalStorage();
}

// ================== THEMES ==================
function setTheme(theme, initial = false) {
  currentTheme = theme;
  localStorage.setItem('grove_theme', theme);
  
  document.querySelectorAll('.theme-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('theme-' + theme).classList.add('active');
  
  const container = document.getElementById('garden-container');
  
  if (theme === 'mist') {
    container.style.background = '#05070f';
  } else if (theme === 'moonlit') {
    container.style.background = '#0a0f1f';
  } else if (theme === 'ember') {
    container.style.background = '#120a05';
  }
  
  if (!initial) {
    document.getElementById('status').innerText = `Theme changed to ${theme}`;
    setTimeout(() => {
      document.getElementById('status').innerText = "The Grove feels different tonight...";
    }, 2000);
  }
}

// ================== MILESTONES ==================
function checkMilestones() {
  const totalStage = Object.values(plants).reduce((sum, p) => sum + p.stage, 0);
  
  if (totalStage >= 12 && !milestones.includes('first_bloom')) {
    milestones.push('first_bloom');
    document.getElementById('status').innerText = "✨ First Bloom achieved!";
    setTimeout(() => {
      document.getElementById('status').innerText = "The garden is waking up...";
    }, 3000);
  }
  
  if (totalGrowth >= 50 && !milestones.includes('halfway')) {
    milestones.push('halfway');
    document.getElementById('status').innerText = "🌿 Halfway to full bloom!";
  }
  
  localStorage.setItem('grove_milestones', JSON.stringify(milestones));
}

// ================== SAVE / LOAD ==================
function saveToLocalStorage() {
  localStorage.setItem('grove_plants', JSON.stringify(plants));
  localStorage.setItem('grove_totalGrowth', totalGrowth);
  localStorage.setItem('grove_lastVisit', lastVisit);
  localStorage.setItem('grove_theme', currentTheme);
}

function exportGarden() {
  const data = {
    plants: plants,
    totalGrowth: totalGrowth,
    theme: currentTheme,
    milestones: milestones,
    exportedAt: new Date().toISOString()
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'numa_grove_backup.json';
  a.click();
  
  document.getElementById('status').innerText = "Garden exported!";
  setTimeout(() => {
    document.getElementById('status').innerText = "The Grove is quiet tonight...";
  }, 2000);
}

// ================== STATS ==================
function showStats() {
  const totalStage = Object.values(plants).reduce((sum, p) => sum + p.stage, 0);
  const avgHealth = Math.round(Object.values(plants).reduce((sum, p) => sum + p.health, 0) / 3);
  
  alert(`The Grove Stats:
  
Total Growth: ${totalGrowth}%
Average Plant Health: ${avgHealth}%
Combined Growth Stage: ${totalStage}/15
Milestones Unlocked: ${milestones.length}

The garden remembers every visit.`);
}

// ================== INITIALIZE ==================
init();

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'w') waterAll();
  if (e.key === 't') talkToPlants();
  if (e.key === 'p') petPlants();
  if (e.key === 's') exportGarden();
});
