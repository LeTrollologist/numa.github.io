<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 • Numa's Space</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cinzel:wght@400;500&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #04060e;
  --accent:   #a89fd8;
  --accent2:  #7fb3a0;
  --text:     #d0d8f0;
  --muted:    #65748f;
  --card-bg:  rgba(6, 9, 20, 0.88);
  --card-bd:  rgba(168, 159, 216, 0.18);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }

body {
  display:flex; align-items:center; justify-content:center;
  font-family:'Josefin Sans', sans-serif;
  color:var(--text); position:relative;
}

/* Atmospheric gradient overlay */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 70% 55% at 18% 55%, rgba(35,22,75,0.45) 0%, transparent 100%),
    radial-gradient(ellipse 60% 50% at 82% 65%, rgba(15,45,35,0.32) 0%, transparent 100%),
    radial-gradient(ellipse 80% 40% at 50% 0%,  rgba(55,35,95,0.22) 0%, transparent 100%);
}

canvas { position:fixed; inset:0; pointer-events:none; }
#stars-canvas { z-index:1; }
#ff-canvas     { z-index:6; }

/* Forest SVG full screen */
#forest-svg {
  position:fixed; bottom:0; left:0;
  width:100%; height:100%;
  z-index:2; overflow:visible;
}

/* ─── Tree sway ─────────────────────────────────────── */
.sway-1, .sway-2, .sway-3, .sway-4 {
  transform-box: fill-box;
  transform-origin: 50% 100%;
}
.sway-1 { animation: sw1  9s  ease-in-out infinite alternate; }
.sway-2 { animation: sw2  12s ease-in-out infinite alternate; }
.sway-3 { animation: sw3  7s  ease-in-out infinite alternate; }
.sway-4 { animation: sw4  15s ease-in-out infinite alternate; }
.sway-bg { animation: sw1 18s ease-in-out infinite alternate; transform-box:fill-box; transform-origin:50% 100%; }

@keyframes sw1 { from{transform:rotate(-0.55deg)} to{transform:rotate(0.65deg)} }
@keyframes sw2 { from{transform:rotate(0.30deg)}  to{transform:rotate(-0.70deg)} }
@keyframes sw3 { from{transform:rotate(-0.45deg)} to{transform:rotate(0.50deg)} }
@keyframes sw4 { from{transform:rotate(0.25deg)}  to{transform:rotate(-0.55deg)} }

/* ─── Fog ────────────────────────────────────────────── */
.fog-wrap {
  position:fixed; inset:0; z-index:3; pointer-events:none;
}
.fog {
  position:absolute; bottom:0; left:-60%;
  width:220%; border-radius:50%;
  filter:blur(35px);
}
.fog-a {
  height:260px;
  background:radial-gradient(ellipse 60% 100% at 50% 100%,
    rgba(120,145,210,0.11) 0%, rgba(100,130,190,0.06) 40%, transparent 70%);
  animation:fd-a 24s ease-in-out infinite alternate;
  bottom:-40px;
}
.fog-b {
  height:180px;
  background:radial-gradient(ellipse 70% 100% at 40% 100%,
    rgba(145,165,215,0.07) 0%, transparent 65%);
  animation:fd-b 37s ease-in-out infinite alternate;
  filter:blur(50px);
  bottom:-20px;
}
.fog-c {
  height:340px;
  background:
    radial-gradient(ellipse 45% 100% at 25% 100%, rgba(110,135,200,0.065) 0%, transparent 60%),
    radial-gradient(ellipse 45% 100% at 75% 100%, rgba(110,135,200,0.065) 0%, transparent 60%);
  animation:fd-c 52s ease-in-out infinite alternate;
  filter:blur(60px);
  bottom:-60px;
}
.fog-d {
  height:120px;
  background:radial-gradient(ellipse 80% 100% at 60% 100%,
    rgba(160,175,220,0.055) 0%, transparent 70%);
  animation:fd-d 18s ease-in-out infinite alternate;
  filter:blur(25px);
  bottom:60px;
}
@keyframes fd-a { from{transform:translateX(0) scaleY(1)}   to{transform:translateX(9%) scaleY(1.18)} }
@keyframes fd-b { from{transform:translateX(-6%) scaleY(.9)} to{transform:translateX(11%) scaleY(1.12)} }
@keyframes fd-c { from{transform:translateX(6%) scaleY(1)}  to{transform:translateX(-9%) scaleY(1.22)} }
@keyframes fd-d { from{transform:translateX(-3%)}           to{transform:translateX(7%)} }

/* ─── Content ────────────────────────────────────────── */
.content {
  position:relative; z-index:10;
  text-align:center; padding:0 28px;
  max-width:520px; width:100%;
}

.eyebrow {
  font-family:'Cinzel', serif;
  font-size:.78rem; letter-spacing:.6em;
  color:var(--muted); margin-bottom:18px;
  text-transform:uppercase;
}

h1 {
  font-family:'Cinzel', serif;
  font-size:clamp(2rem, 5.5vw, 3.5rem);
  font-weight:400; color:var(--text);
  letter-spacing:.04em; margin-bottom:12px;
  text-shadow:0 0 70px rgba(168,159,216,.5), 0 0 140px rgba(168,159,216,.2);
}

.subtitle {
  font-weight:300; font-size:.9rem;
  letter-spacing:.1em; color:var(--muted);
  margin-bottom:38px; line-height:1.85;
}

.card {
  background:var(--card-bg);
  border:1px solid var(--card-bd);
  padding:30px 38px; margin-bottom:26px;
  backdrop-filter:blur(22px);
  position:relative;
}
/* Corner brackets */
.card::before, .card::after {
  content:''; position:absolute;
  width:36px; height:36px;
  border-color:rgba(168,159,216,.28); border-style:solid;
}
.card::before { top:-1px; left:-1px;  border-width:1px 0 0 1px; }
.card::after  { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }

#message {
  font-family:'Cormorant Garamond', serif;
  font-size:1.18rem; font-style:italic;
  line-height:1.85; color:#b4c0e4;
  min-height:58px;
  transition:opacity .5s ease;
}

.btn {
  font-family:'Josefin Sans', sans-serif;
  font-size:.76rem; font-weight:400;
  letter-spacing:.22em; text-transform:uppercase;
  padding:13px 34px;
  background:transparent;
  border:1px solid var(--card-bd);
  color:var(--muted); cursor:pointer;
  transition:all .35s ease;
  display:inline-block; margin-bottom:22px;
}
.btn:hover {
  border-color:var(--accent); color:var(--accent);
  background:rgba(168,159,216,.07);
  box-shadow:0 0 28px rgba(168,159,216,.15);
}

.back {
  display:block; font-size:.75rem; font-weight:300;
  letter-spacing:.18em; text-transform:uppercase;
  color:rgba(101,116,143,.45); text-decoration:none;
  transition:color .3s;
}
.back:hover { color:var(--accent); }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<svg id="forest-svg" xmlns="http://www.w3.org/2000/svg"></svg>
<canvas id="ff-canvas"></canvas>
<div class="fog-wrap">
  <div class="fog fog-a"></div>
  <div class="fog fog-b"></div>
  <div class="fog fog-c"></div>
  <div class="fog fog-d"></div>
</div>

<div class="content">
  <div class="eyebrow">4 · 0 · 4</div>
  <h1>Lost in the Wood</h1>
  <p class="subtitle">The path you followed has grown over.<br>Something else lives here now.</p>
  <div class="card">
    <p id="message"></p>
  </div>
  <button class="btn" id="new-msg">another whisper from the trees</button><br>
  <a href="index.html" class="back">← find your way back</a>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════════════════ */
const MSGS = [
  "Every path leads somewhere. This one just doesn't lead where you expected.",
  "The forest is old enough to have forgotten this page entirely.",
  "The trees don't keep maps. They keep time. Both have run out here.",
  "Somewhere in the dark, a lantern still burns. This isn't where it is.",
  "Old forests swallow everything eventually. Pages are no exception.",
  "Not every door you find is one you should open. Some are already gone.",
  "The river moved. The bridge stayed. Now neither leads anywhere.",
  "You've stepped past the place where words still work. The woods begin here.",
  "A good path is quiet. A lost path is silent. This one has been silent for years.",
  "The oldest trees have seen a thousand lost things. They've forgotten them all.",
  "There is no page here. Only the space where one used to be.",
  "What you're looking for isn't in the dark. But it isn't in the light either.",
  "The forest keeps no inventory. What falls here, stays here.",
  "This clearing holds nothing now. It didn't always.",
  "You've reached the edge of the mapped world. The rest belongs to the trees.",
  "The roots remember everything the branches have let go.",
  "Even the dark has its own geography. You've found an unmapped part."
];

const msgEl = document.getElementById('message');
let lastIdx = -1;

function showMsg(animate) {
  let i; do { i = Math.floor(Math.random() * MSGS.length); } while (i === lastIdx);
  lastIdx = i;
  if (animate) {
    msgEl.style.opacity = '0';
    setTimeout(() => { msgEl.textContent = MSGS[i]; msgEl.style.opacity = '1'; }, 480);
  } else {
    msgEl.textContent = MSGS[i];
  }
}
showMsg(false);
document.getElementById('new-msg').addEventListener('click', () => showMsg(true));


/* ═══════════════════════════════════════════════════════
   SEEDED PRNG  (Mulberry32)
═══════════════════════════════════════════════════════ */
function mkRand(seed) {
  let s = seed >>> 0;
  return function () {
    s += 0x6d2b79f5;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}


/* ═══════════════════════════════════════════════════════
   STARS
═══════════════════════════════════════════════════════ */
const starsCvs = document.getElementById('stars-canvas');
const sCtx     = starsCvs.getContext('2d');

function buildStars() {
  const W = starsCvs.width  = window.innerWidth;
  const H = starsCvs.height = window.innerHeight;
  sCtx.clearRect(0, 0, W, H);
  const r = mkRand(99);
  const n = Math.floor(W * H / 1400);
  for (let i = 0; i < n; i++) {
    const x   = r() * W;
    const y   = r() * H * 0.72;
    const rad = r() * 0.85 + 0.15;
    const op  = r() * 0.45 + 0.1;
    const hue = 200 + r() * 70;
    sCtx.beginPath();
    sCtx.arc(x, y, rad, 0, 6.283);
    sCtx.fillStyle = `hsla(${hue|0},65%,85%,${op.toFixed(2)})`;
    sCtx.fill();
  }
  // A few larger star-clusters / nebula wisps
  for (let i = 0; i < 4; i++) {
    const x = r() * W; const y = r() * H * 0.5;
    const sz = 60 + r() * 120;
    const g  = sCtx.createRadialGradient(x, y, 0, x, y, sz);
    const hue = 220 + r() * 60;
    g.addColorStop(0, `hsla(${hue|0},55%,60%,${(r()*0.04+0.01).toFixed(3)})`);
    g.addColorStop(1, 'transparent');
    sCtx.fillStyle = g;
    sCtx.beginPath(); sCtx.arc(x, y, sz, 0, 6.283); sCtx.fill();
  }
}


/* ═══════════════════════════════════════════════════════
   TREES
═══════════════════════════════════════════════════════ */
const NS    = 'http://www.w3.org/2000/svg';
const fsvg  = document.getElementById('forest-svg');

/**
 * Recursively draw branches into a <g> element.
 * Local coords: base at (0,0), trunk grows upward (negative y).
 */
function branch(parent, x, y, angle, len, depth, maxD, rand, cfg) {
  if (len < 1.2) return;

  const rad  = angle * Math.PI / 180;
  const ex   = x + len * Math.sin(rad);
  const ey   = y - len * Math.cos(rad);
  const t    = depth / maxD;                          // 0=trunk → 1=tips
  const sw   = Math.max(0.38, cfg.tw * Math.pow(1 - t * 0.88, 2.5));

  const ln = document.createElementNS(NS, 'line');
  ln.setAttribute('x1', x.toFixed(1)); ln.setAttribute('y1', y.toFixed(1));
  ln.setAttribute('x2', ex.toFixed(1)); ln.setAttribute('y2', ey.toFixed(1));
  ln.setAttribute('stroke-width', sw.toFixed(2));
  parent.appendChild(ln);

  if (depth >= maxD) return;

  const r1 = rand();
  // Branching count: mostly 2, sometimes 3 (mid-depth), rarely 1 (dying branch)
  let nb;
  if (depth === 0) {
    nb = 1; // single trunk segment continues
  } else if (depth < 2) {
    nb = 2;
  } else {
    nb = r1 < 0.12 ? 1 : (r1 < 0.78 ? 2 : 3);
  }

  const spreadGrow = cfg.sp * (1 + depth * 0.12);
  const lf = cfg.lf * (0.84 + rand() * 0.32);

  if (nb === 1) {
    branch(parent, ex, ey, angle + (rand()-0.5)*spreadGrow*0.35, len*lf, depth+1, maxD, rand, cfg);
  } else if (nb === 2) {
    const ls = spreadGrow * (0.42 + rand()*0.42);
    const rs = spreadGrow * (0.42 + rand()*0.42);
    const lean = (rand()-0.5) * spreadGrow * 0.12;
    branch(parent, ex, ey, angle - ls + lean, len * cfg.lf*(0.8+rand()*.3), depth+1, maxD, rand, cfg);
    branch(parent, ex, ey, angle + rs + lean, len * cfg.lf*(0.8+rand()*.3), depth+1, maxD, rand, cfg);
  } else {
    const s = spreadGrow * (0.58 + rand()*0.28);
    branch(parent, ex, ey, angle - s,                      len*cfg.lf*(0.78+rand()*.28), depth+1, maxD, rand, cfg);
    branch(parent, ex, ey, angle + (rand()-0.5)*s*0.22,    len*cfg.lf*(0.68+rand()*.22), depth+1, maxD, rand, cfg);
    branch(parent, ex, ey, angle + s,                      len*cfg.lf*(0.78+rand()*.28), depth+1, maxD, rand, cfg);
  }
}

function addRoots(inner, rand, cfg) {
  // Buttress roots sprawling from (0,0)
  const nr = 3 + Math.floor(rand() * 3);
  for (let i = 0; i < nr; i++) {
    const a = (rand() - 0.5) * 80;  // angle from base
    const l = cfg.th * 0.18 + rand() * cfg.th * 0.12;
    const rad = a * Math.PI / 180;
    const ex = l * Math.sin(rad);
    const ey = l * 0.45;             // roots go slightly downward
    const ln = document.createElementNS(NS, 'line');
    ln.setAttribute('x1', '0'); ln.setAttribute('y1', '0');
    ln.setAttribute('x2', ex.toFixed(1)); ln.setAttribute('y2', ey.toFixed(1));
    ln.setAttribute('stroke-width', (cfg.tw * 0.55).toFixed(2));
    inner.appendChild(ln);
  }
}

function makeTree(cfg) {
  const { x, y, th, sp, lf, maxD, tw, swayClass, seed, col } = cfg;
  const rand = mkRand(seed);

  // Outer group = position
  const outer = document.createElementNS(NS, 'g');
  outer.setAttribute('transform', `translate(${x.toFixed(1)},${y.toFixed(1)})`);

  // Inner group = animation pivot
  const inner = document.createElementNS(NS, 'g');
  inner.setAttribute('class', swayClass);
  inner.setAttribute('stroke', col);
  inner.setAttribute('stroke-linecap', 'round');
  inner.setAttribute('stroke-linejoin', 'round');
  inner.setAttribute('fill', 'none');

  addRoots(inner, mkRand(seed + 9999), { tw, th });
  branch(inner, 0, 0, 0, th, 0, maxD, rand, { tw, sp, lf });

  outer.appendChild(inner);
  fsvg.appendChild(outer);
}

function buildForest() {
  fsvg.innerHTML = '';
  const W = window.innerWidth;
  const H = window.innerHeight;
  const b = H;  // base Y = bottom of screen

  /*  Background trees (lighter colour, less depth = more atmospheric / distant)  */
  const bgCol = '#0b1020';
  const bgTrees = [
    { x:W*.30, y:b, th:H*.22, sp:24, lf:.73, maxD:7, tw:7,  swayClass:'sway-bg', seed:91, col:bgCol },
    { x:W*.44, y:b, th:H*.18, sp:22, lf:.74, maxD:7, tw:6,  swayClass:'sway-bg', seed:92, col:bgCol },
    { x:W*.56, y:b, th:H*.20, sp:26, lf:.72, maxD:7, tw:7,  swayClass:'sway-bg', seed:93, col:bgCol },
    { x:W*.67, y:b, th:H*.17, sp:23, lf:.73, maxD:6, tw:5,  swayClass:'sway-bg', seed:94, col:bgCol },
  ];

  /*  Foreground trees  */
  const trees = [
    // Far-left massive oak
    { x:W*-.04, y:b, th:H*.58, sp:27, lf:.69, maxD:11, tw:24, swayClass:'sway-1', seed:1001, col:'#03060c' },
    // Left – tall gaunt tree
    { x:W*.09,  y:b, th:H*.50, sp:36, lf:.65, maxD:10, tw:15, swayClass:'sway-3', seed:2002, col:'#040710' },
    // Left-centre – spreading mid tree
    { x:W*.21,  y:b, th:H*.40, sp:31, lf:.71, maxD:10, tw:17, swayClass:'sway-2', seed:3003, col:'#040811' },
    // Near-centre left – smaller tree, closer to content
    { x:W*.33,  y:b, th:H*.30, sp:29, lf:.72, maxD:9,  tw:11, swayClass:'sway-4', seed:4004, col:'#060b18' },
    // Near-centre right
    { x:W*.65,  y:b, th:H*.32, sp:27, lf:.72, maxD:9,  tw:12, swayClass:'sway-2', seed:5005, col:'#060a16' },
    // Right-centre
    { x:W*.77,  y:b, th:H*.42, sp:30, lf:.70, maxD:10, tw:16, swayClass:'sway-1', seed:6006, col:'#03070f' },
    // Right large
    { x:W*.89,  y:b, th:H*.54, sp:25, lf:.68, maxD:11, tw:22, swayClass:'sway-3', seed:7007, col:'#030610' },
    // Far-right – mostly off screen
    { x:W*1.03, y:b, th:H*.46, sp:29, lf:.70, maxD:10, tw:18, swayClass:'sway-4', seed:8008, col:'#04070d' },
  ];

  bgTrees.forEach(makeTree);
  trees.forEach(makeTree);
}


/* ═══════════════════════════════════════════════════════
   FIREFLIES
═══════════════════════════════════════════════════════ */
const ffCvs = document.getElementById('ff-canvas');
const ffCtx = ffCvs.getContext('2d');
let flies   = [];
let raf;

class Firefly {
  constructor() { this.init(true); }

  init(random) {
    const W = ffCvs.width, H = ffCvs.height;
    this.x = random ? Math.random() * W : (this.tx ?? Math.random() * W);
    this.y = random
      ? H * (0.18 + Math.random() * 0.78)
      : H * (0.25 + Math.random() * 0.70);

    // 30% are "foreground" fireflies – bigger, brighter
    this.fg = Math.random() > 0.7;
    this.sz  = this.fg ? Math.random() * 1.9 + 1.1 : Math.random() * 0.9 + 0.35;

    // Warm bioluminescent colours: yellow-gold → green-gold → cool white
    this.hue  = 52 + Math.random() * 48;  // 52–100
    this.sat  = 72 + Math.random() * 22;

    this.pulseSpd   = Math.random() * 0.022 + 0.010;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.speed      = (Math.random() * 0.0025 + 0.0008) * (this.fg ? 1 : 0.65);

    this.newTarget();
    this.progress = Math.random(); // start anywhere in curve
  }

  newTarget() {
    const W = ffCvs.width, H = ffCvs.height;
    this.sx = this.tx ?? this.x;
    this.sy = this.ty ?? this.y;

    const dist = 50 + Math.random() * 130;
    const ang  = Math.random() * Math.PI * 2;
    this.tx = Math.max(15, Math.min(W-15, this.sx + Math.cos(ang)*dist));
    this.ty = Math.max(H*0.12, Math.min(H*0.92, this.sy + Math.sin(ang)*dist));

    // Cubic bezier control points
    const jitter = () => (Math.random()-0.5) * 90;
    this.c1x = this.sx + jitter(); this.c1y = this.sy + jitter();
    this.c2x = this.tx + jitter(); this.c2y = this.ty + jitter();

    this.progress = 0;
  }

  update() {
    this.progress += this.speed;
    if (this.progress >= 1) this.newTarget();

    const t = this.progress, m = 1-t;
    this.x = m*m*m*this.sx + 3*m*m*t*this.c1x + 3*m*t*t*this.c2x + t*t*t*this.tx;
    this.y = m*m*m*this.sy + 3*m*m*t*this.c1y + 3*m*t*t*this.c2y + t*t*t*this.ty;

    this.pulsePhase += this.pulseSpd;
    const p = 0.5 + 0.5 * Math.sin(this.pulsePhase);
    this.op = this.fg ? (0.28 + p*0.72) : (0.08 + p*0.42);
    this.cs = this.sz * (0.65 + p*0.60);
  }

  draw() {
    const x = this.x, y = this.y, s = this.cs, op = this.op;
    const h = this.hue|0, sat = this.sat|0;

    ffCtx.save();
    ffCtx.globalAlpha = op;

    // Haze (very wide, very soft)
    const hazeR = s * (this.fg ? 18 : 10);
    const g0 = ffCtx.createRadialGradient(x, y, 0, x, y, hazeR);
    g0.addColorStop(0,   `hsla(${h},${sat}%,68%,0.12)`);
    g0.addColorStop(0.5, `hsla(${h},${sat-15}%,55%,0.06)`);
    g0.addColorStop(1,   'transparent');
    ffCtx.fillStyle = g0;
    ffCtx.beginPath(); ffCtx.arc(x, y, hazeR, 0, 6.283); ffCtx.fill();

    // Mid glow
    const midR = s * (this.fg ? 6 : 3.5);
    const g1 = ffCtx.createRadialGradient(x, y, 0, x, y, midR);
    g1.addColorStop(0,   `hsla(${h},${sat}%,85%,0.75)`);
    g1.addColorStop(0.6, `hsla(${h},${sat}%,70%,0.30)`);
    g1.addColorStop(1,   'transparent');
    ffCtx.fillStyle = g1;
    ffCtx.beginPath(); ffCtx.arc(x, y, midR, 0, 6.283); ffCtx.fill();

    // Bright core
    ffCtx.fillStyle = `hsla(${h+8},${sat-10}%,96%,0.95)`;
    ffCtx.beginPath(); ffCtx.arc(x, y, s, 0, 6.283); ffCtx.fill();

    ffCtx.restore();
  }
}

function initFflies() {
  const W = ffCvs.width  = window.innerWidth;
  const H = ffCvs.height = window.innerHeight;
  const n = Math.floor(W * H / 4800);
  flies = Array.from({length: n}, () => new Firefly());
}

function loopFF() {
  ffCtx.clearRect(0, 0, ffCvs.width, ffCvs.height);
  flies.forEach(f => { f.update(); f.draw(); });
  raf = requestAnimationFrame(loopFF);
}


/* ═══════════════════════════════════════════════════════
   INIT + RESIZE
═══════════════════════════════════════════════════════ */
function init() {
  buildStars();
  buildForest();
  initFflies();
  cancelAnimationFrame(raf);
  loopFF();
}

window.addEventListener('resize', init);
init();
</script>
</body>
