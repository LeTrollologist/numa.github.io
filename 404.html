<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 • The Woods</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c14;
  --accent: #c4b5fd;
  --text: #e0e7ff;
  --muted: #8b9dc3;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh;
  background: #0a0c14;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-family: 'Space Grotesk', system_ui, sans-serif;
  color: var(--text);
  overflow: hidden;
  position: relative;
}
canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  pointer-events: none;
}
#fog-canvas {
  z-index: 2;
  mix-blend-mode: screen;
}
.container {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 50px 40px;
  max-width: 540px;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.8rem, 7vw, 4.4rem);
  color: #e0e7ff;
  margin-bottom: 16px;
  letter-spacing: -1.2px;
  text-shadow: 0 0 50px rgba(196, 181, 253, 0.5);
}
.subtitle {
  font-size: 1.1rem;
  color: var(--muted);
  margin-bottom: 44px;
  line-height: 1.65;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}
.message-box {
  background: rgba(15, 17, 28, 0.8);
  border: 1px solid rgba(196, 181, 253, 0.25);
  border-radius: 18px;
  padding: 30px 34px;
  margin-bottom: 34px;
  backdrop-filter: blur(24px);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}
#message {
  font-size: 1.1rem;
  line-height: 1.75;
  color: #c7d2fe;
  min-height: 80px;
  font-style: italic;
}
.btn {
  font-family: 'Space Grotesk', system_ui, sans-serif;
  font-size: 1.0rem;
  font-weight: 500;
  padding: 15px 42px;
  background: rgba(196, 181, 253, 0.1);
  border: 1px solid rgba(196, 181, 253, 0.45);
  border-radius: 50px;
  color: #c4b5fd;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  letter-spacing: 0.6px;
}
.btn:hover {
  background: rgba(196, 181, 253, 0.18);
  border-color: #c4b5fd;
  color: #e0e7ff;
  transform: translateY(-3px);
  box-shadow: 0 12px 35px rgba(196, 181, 253, 0.25);
}
.back-home {
  margin-top: 34px;
  font-size: 0.94rem;
  color: rgba(139, 157, 195, 0.5);
  text-decoration: none;
  transition: color 0.3s;
  letter-spacing: 0.5px;
}
.back-home:hover {
  color: #c4b5fd;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<canvas id="fog-canvas"></canvas>

<div class="container">
  <h1>404 • The Woods</h1>
  <p class="subtitle">This page wandered too deep into the forest and lost its way.</p>
  
  <div class="message-box">
    <div id="message"></div>
  </div>
  
  <button class="btn" onclick="newMessage()">Another message from the trees</button>
  <a href="index.html" class="back-home">← Return to the station</a>
</div>

<script>
// ================== TWILIGHT FOREST MESSAGES ==================
const messages = [
  "The trees are older than memory. This page got caught between them.",
  "Even the mist has its own secrets. This page found one it wasn't ready for.",
  "The forest doesn't lose things. It just keeps them for a while.",
  "Some paths only appear when you're not looking for them.",
  "This page took the long way through the dark. Most things worth finding are there.",
  "The woods are quiet tonight. This page is listening.",
  "Not all who enter the forest come back the same.",
  "The fireflies don't lie. This page just isn't ready to be seen yet.",
  "The mist moves like it has somewhere to be. This page got left behind.",
  "Some things are meant to be found. Others are meant to stay lost a little longer.",
  "The trees remember every name. This page just hasn't earned one yet.",
  "The forest floor is soft. This page sank a little too deep.",
  "Even in the darkest part of the woods, something is always watching.",
  "This page took a wrong turn and found something it wasn't looking for.",
  "The mist doesn't clear for everyone. This page is still waiting."
];

const messageEl = document.getElementById('message');

function newMessage() {
  const randomIndex = Math.floor(Math.random() * messages.length);
  messageEl.style.transition = 'opacity 0.4s ease';
  messageEl.style.opacity = '0';
 
  setTimeout(() => {
    messageEl.innerText = messages[randomIndex];
    messageEl.style.opacity = '1';
  }, 400);
}

function showInitialMessage() {
  const randomIndex = Math.floor(Math.random() * messages.length);
  messageEl.innerText = messages[randomIndex];
}
showInitialMessage();

// ================== CANVAS: FIREFLIES + FOG ==================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fogCanvas = document.getElementById('fog-canvas');
const fogCtx = fogCanvas.getContext('2d');

let width = canvas.width = fogCanvas.width = window.innerWidth;
let height = canvas.height = fogCanvas.height = window.innerHeight;

let fireflies = [];
let fogParticles = [];

window.addEventListener('resize', () => {
  width = canvas.width = fogCanvas.width = window.innerWidth;
  height = canvas.height = fogCanvas.height = window.innerHeight;
  createFireflies();
  createFog();
});

class Firefly {
  constructor() { this.reset(); }
  
  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * (height * 0.8);
    this.size = Math.random() * 2.6 + 1.1;
    this.speedX = (Math.random() - 0.5) * 0.55;
    this.speedY = (Math.random() - 0.5) * 0.35;
    this.opacity = Math.random() * 0.55 + 0.45;
    this.twinkleSpeed = Math.random() * 0.07 + 0.035;
    this.twinklePhase = Math.random() * Math.PI * 2;
  }
  
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.twinklePhase += this.twinkleSpeed;
    this.opacity = 0.45 + Math.sin(this.twinklePhase) * 0.5;
    
    this.speedX += (Math.random() - 0.5) * 0.025;
    this.speedY += (Math.random() - 0.5) * 0.018;
    
    if (this.x < 0 || this.x > width) this.speedX *= -0.75;
    if (this.y < 0 || this.y > height * 0.85) this.speedY *= -0.75;
    
    this.speedX = Math.max(-1.1, Math.min(1.1, this.speedX));
    this.speedY = Math.max(-0.85, Math.min(0.85, this.speedY));
  }
  
  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 4);
    gradient.addColorStop(0, 'rgba(196, 181, 253, 0.95)');
    gradient.addColorStop(0.4, 'rgba(167, 139, 250, 0.4)');
    gradient.addColorStop(1, 'transparent');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = 'rgba(224, 242, 254, 0.95)';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function createFireflies() {
  fireflies = [];
  const count = Math.floor((width * height) / 2600);
  for (let i = 0; i < count; i++) fireflies.push(new Firefly());
}

class FogParticle {
  constructor(layer) {
    this.layer = layer;
    this.reset();
  }
  
  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.size = Math.random() * 160 + (this.layer === 1 ? 110 : 70);
    this.speedX = (Math.random() - 0.5) * (this.layer === 1 ? 0.22 : 0.38);
    this.opacity = this.layer === 1 ? 0.11 : 0.07;
  }
  
  update() {
    this.x += this.speedX;
    if (this.x < -this.size) this.x = width + this.size;
    if (this.x > width + this.size) this.x = -this.size;
  }
  
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    const gradient = ctx.createRadialGradient(this.x, this.y, this.size * 0.08, this.x, this.y, this.size);
    gradient.addColorStop(0, 'rgba(200, 210, 255, 0.85)');
    gradient.addColorStop(0.5, 'rgba(180, 195, 255, 0.35)');
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function createFog() {
  fogParticles = [];
  for (let i = 0; i < 8; i++) fogParticles.push(new FogParticle(1));
  for (let i = 0; i < 14; i++) fogParticles.push(new FogParticle(2));
}

function drawFog() {
  fogCtx.clearRect(0, 0, width, height);
  fogParticles.forEach(p => { p.update(); p.draw(fogCtx); });
}

function animate() {
  ctx.clearRect(0, 0, width, height);
  
  // Dark forest edge
  ctx.fillStyle = 'rgba(8, 10, 14, 0.65)';
  ctx.beginPath();
  ctx.moveTo(0, height);
  ctx.lineTo(60, height * 0.52);
  ctx.lineTo(140, height * 0.68);
  ctx.lineTo(220, height * 0.45);
  ctx.lineTo(300, height * 0.61);
  ctx.lineTo(380, height * 0.38);
  ctx.lineTo(460, height * 0.55);
  ctx.lineTo(width, height);
  ctx.fill();
  
  fireflies.forEach(f => { f.update(); f.draw(); });
  drawFog();
  
  requestAnimationFrame(animate);
}

function init() {
  createFireflies();
  createFog();
  animate();
  
  setInterval(() => {
    fogParticles.forEach(p => {
      p.speedX = (Math.random() - 0.5) * (p.layer === 1 ? 0.22 : 0.38);
    });
  }, 7500);
}

init();
</script>
</body>
</html>
