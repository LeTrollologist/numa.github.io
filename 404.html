<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 • Lost in the Mist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --forest: #0a120f;
  --forest-dark: #050a08;
  --accent: #a5f3fc;
  --warm: #fed7aa;
  --text: #e0f2fe;
  --purple: #c4b5fd;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh;
  background: #050a08;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-family: 'Space Grotesk', system_ui, sans-serif;
  color: var(--text);
  overflow: hidden;
  position: relative;
}
canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  pointer-events: none;
}
#fog-canvas {
  z-index: 2;
  mix-blend-mode: screen;
}
.container {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 50px 40px;
  max-width: 560px;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.6rem, 6.5vw, 4.2rem);
  color: #e0f2fe;
  margin-bottom: 14px;
  letter-spacing: -1.5px;
  text-shadow: 0 0 40px rgba(165, 243, 252, 0.4);
}
.subtitle {
  font-size: 1.15rem;
  color: rgba(224, 242, 254, 0.6);
  margin-bottom: 42px;
  line-height: 1.7;
  max-width: 440px;
  margin-left: auto;
  margin-right: auto;
}
.message-box {
  background: rgba(10, 18, 15, 0.75);
  border: 1px solid rgba(165, 243, 252, 0.2);
  border-radius: 20px;
  padding: 30px 34px;
  margin-bottom: 34px;
  backdrop-filter: blur(24px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}
#message {
  font-size: 1.12rem;
  line-height: 1.8;
  color: #bae6fd;
  min-height: 82px;
  font-style: italic;
}
.btn {
  font-family: 'Space Grotesk', system_ui, sans-serif;
  font-size: 1.02rem;
  font-weight: 500;
  padding: 15px 40px;
  background: rgba(165, 243, 252, 0.1);
  border: 1px solid rgba(165, 243, 252, 0.4);
  border-radius: 50px;
  color: #a5f3fc;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  letter-spacing: 0.8px;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transition: 0.6s;
}
.btn:hover::before {
  left: 250%;
}
.btn:hover {
  background: rgba(165, 243, 252, 0.18);
  border-color: #a5f3fc;
  color: white;
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(165, 243, 252, 0.2);
}
.back-home {
  margin-top: 32px;
  font-size: 0.95rem;
  color: rgba(224, 242, 254, 0.4);
  text-decoration: none;
  transition: color 0.3s;
  letter-spacing: 0.6px;
  display: inline-block;
}
.back-home:hover {
  color: #a5f3fc;
}
.tree {
  position: absolute;
  bottom: 0;
  width: 180px;
  height: 420px;
  background: linear-gradient(#0f1a15, #050a08);
  border-radius: 50% 50% 0 0;
  z-index: 3;
  opacity: 0.85;
}
.tree.left { left: -60px; transform: scaleX(0.9); }
.tree.right { right: -60px; transform: scaleX(0.9); }
.light-ray {
  position: absolute;
  top: 0;
  left: 50%;
  width: 280px;
  height: 100%;
  background: linear-gradient(180deg, 
    rgba(165, 243, 252, 0.08) 0%, 
    rgba(165, 243, 252, 0.03) 40%, 
    transparent 70%);
  transform: translateX(-50%) rotate(-12deg);
  z-index: 4;
  pointer-events: none;
  animation: lightMove 18s ease-in-out infinite;
}
@keyframes lightMove {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) rotate(-12deg); }
  50% { opacity: 0.35; transform: translateX(-48%) rotate(-8deg); }
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<canvas id="fog-canvas"></canvas>

<div class="container">
  <h1>404 • Drifting</h1>
  <p class="subtitle">This page wandered too deep into the mist and lost its way.</p>
  
  <div class="message-box">
    <div id="message"></div>
  </div>
  
  <button class="btn" onclick="newMessage()">New message from the mist</button>
  <a href="index.html" class="back-home">← Return to the station</a>
</div>

<script>
// ================== TWILIGHT FOREST MESSAGES ==================
const messages = [
  "Even in the deepest woods, some paths still lead home.",
  "This page got lost among the ancient trees.",
  "The mist is thick tonight. This page took a wrong turn.",
  "Sometimes we must get lost in the forest to find ourselves.",
  "The trees remember every soul that passed through.",
  "Not all who wander are lost. Some are just listening to the forest.",
  "This page drifted into the wrong part of the woods.",
  "The fireflies are quiet tonight. This page is too.",
  "Even broken paths can lead to beautiful places.",
  "The forest doesn't make mistakes. It just rearranges things.",
  "Out here in the dark, small lights still matter.",
  "This page took the scenic route through the mist.",
  "Sometimes we need to get lost to find something worth keeping.",
  "The trees are watching. This page is being gently held.",
  "Floating through fog and memory… you found this anyway."
];

const messageEl = document.getElementById('message');

function newMessage() {
  const randomIndex = Math.floor(Math.random() * messages.length);
  messageEl.style.transition = 'opacity 0.4s ease';
  messageEl.style.opacity = '0';
 
  setTimeout(() => {
    messageEl.innerText = messages[randomIndex];
    messageEl.style.opacity = '1';
  }, 400);
}

function showInitialMessage() {
  const randomIndex = Math.floor(Math.random() * messages.length);
  messageEl.innerText = messages[randomIndex];
}
showInitialMessage();

// ================== ADVANCED CANVAS: FIREFLIES + FOG ==================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fogCanvas = document.getElementById('fog-canvas');
const fogCtx = fogCanvas.getContext('2d');

let width = canvas.width = fogCanvas.width = window.innerWidth;
let height = canvas.height = fogCanvas.height = window.innerHeight;

let fireflies = [];
let fogParticles = [];

window.addEventListener('resize', () => {
  width = canvas.width = fogCanvas.width = window.innerWidth;
  height = canvas.height = fogCanvas.height = window.innerHeight;
  createFireflies();
  createFog();
});

// === FIREFLIES ===
class Firefly {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * (height * 0.75);
    this.size = Math.random() * 2.8 + 1.2;
    this.speedX = (Math.random() - 0.5) * 0.6;
    this.speedY = (Math.random() - 0.5) * 0.4;
    this.opacity = Math.random() * 0.6 + 0.4;
    this.twinkleSpeed = Math.random() * 0.08 + 0.04;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.hue = Math.random() * 40 + 180; // blue-green range
  }
  
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.twinklePhase += this.twinkleSpeed;
    this.opacity = 0.5 + Math.sin(this.twinklePhase) * 0.45;
    
    // Gentle floating
    this.speedX += (Math.random() - 0.5) * 0.03;
    this.speedY += (Math.random() - 0.5) * 0.02;
    
    // Boundary bounce
    if (this.x < 0 || this.x > width) this.speedX *= -0.8;
    if (this.y < 0 || this.y > height * 0.8) this.speedY *= -0.8;
    
    // Clamp speed
    this.speedX = Math.max(-1.2, Math.min(1.2, this.speedX));
    this.speedY = Math.max(-0.9, Math.min(0.9, this.speedY));
  }
  
  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    
    // Glow
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0, 
      this.x, this.y, this.size * 3.5
    );
    gradient.addColorStop(0, `hsla(${this.hue}, 85%, 88%, 0.9)`);
    gradient.addColorStop(0.5, `hsla(${this.hue}, 75%, 75%, 0.3)`);
    gradient.addColorStop(1, 'transparent');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 3.5, 0, Math.PI * 2);
    ctx.fill();
    
    // Core
    ctx.fillStyle = `hsla(${this.hue}, 90%, 95%, 1)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
  }
}

function createFireflies() {
  fireflies = [];
  const count = Math.floor((width * height) / 2800);
  for (let i = 0; i < count; i++) {
    fireflies.push(new Firefly());
  }
}

// === FOG LAYERS ===
class FogParticle {
  constructor(layer) {
    this.layer = layer;
    this.reset();
  }
  
  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.size = Math.random() * 180 + (this.layer === 1 ? 120 : 80);
    this.speedX = (Math.random() - 0.5) * (this.layer === 1 ? 0.25 : 0.45);
    this.opacity = this.layer === 1 ? 0.12 : 0.08;
  }
  
  update() {
    this.x += this.speedX;
    
    if (this.x < -this.size) this.x = width + this.size;
    if (this.x > width + this.size) this.x = -this.size;
  }
  
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    
    const gradient = ctx.createRadialGradient(
      this.x, this.y, this.size * 0.1,
      this.x, this.y, this.size
    );
    gradient.addColorStop(0, 'rgba(200, 220, 255, 0.9)');
    gradient.addColorStop(0.5, 'rgba(180, 210, 255, 0.4)');
    gradient.addColorStop(1, 'transparent');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function createFog() {
  fogParticles = [];
  // Layer 1 - slow, large
  for (let i = 0; i < 7; i++) {
    fogParticles.push(new FogParticle(1));
  }
  // Layer 2 - faster, smaller
  for (let i = 0; i < 12; i++) {
    fogParticles.push(new FogParticle(2));
  }
}

function drawFog() {
  fogCtx.clearRect(0, 0, width, height);
  
  fogParticles.forEach(p => {
    p.update();
    p.draw(fogCtx);
  });
}

// === MAIN ANIMATION ===
function animate() {
  ctx.clearRect(0, 0, width, height);
  
  // Draw subtle tree silhouettes
  ctx.fillStyle = 'rgba(8, 14, 11, 0.6)';
  ctx.beginPath();
  ctx.moveTo(0, height);
  ctx.lineTo(80, height * 0.55);
  ctx.lineTo(160, height * 0.72);
  ctx.lineTo(240, height * 0.48);
  ctx.lineTo(320, height * 0.65);
  ctx.lineTo(400, height * 0.42);
  ctx.lineTo(480, height * 0.58);
  ctx.lineTo(width, height);
  ctx.fill();
  
  // Draw fireflies
  fireflies.forEach(f => {
    f.update();
    f.draw();
  });
  
  // Draw fog
  drawFog();
  
  requestAnimationFrame(animate);
}

// === INITIALIZE ===
function init() {
  createFireflies();
  createFog();
  animate();
  
  // Gentle fog movement
  setInterval(() => {
    fogParticles.forEach(p => {
      p.speedX = (Math.random() - 0.5) * (p.layer === 1 ? 0.25 : 0.45);
    });
  }, 8000);
}

init();
</script>
</body>
</html>
