<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Hollow · Numa's Sketchbook</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=Cinzel:wght@400;500&family=Josefin+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════ RESET + VARS ══════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#04060e; }

:root {
  --bg:         #04060e;
  --panel:      rgba(5, 8, 20, 0.90);
  --panel-lite: rgba(8, 11, 26, 0.78);
  --border:     rgba(168,159,216,0.14);
  --border-h:   rgba(168,159,216,0.32);
  --accent:     #a89fd8;
  --accent-dim: rgba(168,159,216,0.18);
  --text:       #cdd5ed;
  --muted:      #5c6a85;
  --canvas-bg:  13;
  --danger-bg:  rgba(200,55,55,0.15);
  --danger-bd:  rgba(200,55,55,0.30);
  --danger-tx:  #e89090;
}
body.moonlit {
  --accent:     #7eb8f7;
  --accent-dim: rgba(126,184,247,0.16);
  --border:     rgba(126,184,247,0.13);
  --border-h:   rgba(126,184,247,0.30);
}
body.ember {
  --accent:     #f0a96a;
  --accent-dim: rgba(240,169,106,0.15);
  --border:     rgba(240,169,106,0.13);
  --border-h:   rgba(240,169,106,0.30);
}

body {
  font-family: 'Josefin Sans', sans-serif;
  color: var(--text);
}

/* ═══════════════════════════════════ BACKGROUND ════════════════════════════════════ */
.bg-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
}
#stars-cvs { z-index: 1; }
#forest-svg {
  position: fixed; bottom: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 2; overflow: visible;
  pointer-events: none;
}
#ff-cvs { z-index: 6; }

/* tree sway */
.sw1,.sw2,.sw3,.sw4,.swb {
  transform-box: fill-box; transform-origin: 50% 100%;
}
.sw1 { animation: sw1  9s  ease-in-out infinite alternate; }
.sw2 { animation: sw2  12s ease-in-out infinite alternate; }
.sw3 { animation: sw3  7s  ease-in-out infinite alternate; }
.sw4 { animation: sw4  15s ease-in-out infinite alternate; }
.swb { animation: sw1  19s ease-in-out infinite alternate; }
@keyframes sw1 { from{transform:rotate(-0.55deg)} to{transform:rotate(0.65deg)} }
@keyframes sw2 { from{transform:rotate(0.30deg)}  to{transform:rotate(-0.70deg)} }
@keyframes sw3 { from{transform:rotate(-0.45deg)} to{transform:rotate(0.50deg)} }
@keyframes sw4 { from{transform:rotate(0.25deg)}  to{transform:rotate(-0.55deg)} }

/* fog */
.fog-wrap { position:fixed; inset:0; z-index:3; pointer-events:none; }
.fog { position:absolute; bottom:0; left:-60%; width:220%; border-radius:50%; }
.fog-a { height:260px; filter:blur(36px); animation:fda 26s ease-in-out infinite alternate; bottom:-30px; }
.fog-b { height:190px; filter:blur(55px); animation:fdb 40s ease-in-out infinite alternate; bottom:-10px; }
.fog-c { height:340px; filter:blur(68px); animation:fdc 55s ease-in-out infinite alternate; bottom:-55px; }
.fog-d { height:115px; filter:blur(24px); animation:fdd 19s ease-in-out infinite alternate; bottom:55px; }
@keyframes fda { from{transform:translateX(0) scaleY(1)}    to{transform:translateX(9%) scaleY(1.18)} }
@keyframes fdb { from{transform:translateX(-6%) scaleY(.9)} to{transform:translateX(11%) scaleY(1.12)} }
@keyframes fdc { from{transform:translateX(6%) scaleY(1)}   to{transform:translateX(-9%) scaleY(1.22)} }
@keyframes fdd { from{transform:translateX(-3%)}            to{transform:translateX(7%)} }

/* fog colours by theme */
:root {
  --fa: radial-gradient(ellipse 60% 100% at 50% 100%,rgba(120,145,210,.11) 0%,rgba(100,130,190,.055) 40%,transparent 70%);
  --fb: radial-gradient(ellipse 70% 100% at 40% 100%,rgba(145,165,215,.07) 0%,transparent 65%);
  --fc: radial-gradient(ellipse 45% 100% at 25% 100%,rgba(110,135,200,.06) 0%,transparent 60%),
        radial-gradient(ellipse 45% 100% at 75% 100%,rgba(110,135,200,.06) 0%,transparent 60%);
  --fd: radial-gradient(ellipse 80% 100% at 60% 100%,rgba(160,175,220,.05) 0%,transparent 70%);
}
.fog-a { background:var(--fa); }
.fog-b { background:var(--fb); }
.fog-c { background:var(--fc); }
.fog-d { background:var(--fd); }

/* ═══════════════════════════════════ APP SHELL ═════════════════════════════════════ */
#app {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  height: 100vh; width: 100%;
}

/* ── Header ── */
header {
  height: 50px; flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex; align-items: center;
  padding: 0 16px; gap: 12px;
}
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.0rem; font-weight: 400;
  color: var(--text); letter-spacing: .10em;
  white-space: nowrap; flex-shrink: 0;
}
.logo em { color: var(--accent); font-style: normal; }
.logo-sub {
  font-size: .62rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); white-space: nowrap; flex-shrink: 0;
}
.h-center {
  flex: 1; display: flex; justify-content: center; align-items: center;
  min-width: 0;
}
.tool-pill {
  font-size: .66rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--accent);
  border: 1px solid var(--border); background: var(--accent-dim);
  padding: 4px 14px; white-space: nowrap;
}
.h-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.hbtn {
  font-family: 'Josefin Sans', sans-serif;
  font-size: .66rem; letter-spacing: .13em; text-transform: uppercase;
  font-weight: 400;
  padding: 5px 12px; cursor: pointer;
  border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  transition: all .22s;
}
.hbtn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.hbtn.hi { border-color: var(--border-h); color: var(--accent); background: var(--accent-dim); }

/* ── Main ── */
.main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── Sidebars ── */
.sidebar, .r-sidebar {
  background: var(--panel);
  border-color: var(--border);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex; flex-direction: column;
  overflow-y: auto; flex-shrink: 0;
  scrollbar-width: none;
}
.sidebar::-webkit-scrollbar, .r-sidebar::-webkit-scrollbar { display: none; }
.sidebar  { width: 190px; border-right: 1px solid var(--border); }
.r-sidebar { width: 228px; border-left:  1px solid var(--border); }

.section {
  padding: 12px 13px 10px;
  border-bottom: 1px solid rgba(168,159,216,.06);
}
.section:last-child { border-bottom: none; flex: 1; }
.sec-label {
  display: block;
  font-size: .60rem; letter-spacing: .22em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 9px;
}

/* tool grid */
.tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.tbtn {
  font-family: 'Josefin Sans', sans-serif;
  font-size: .64rem; letter-spacing: .06em;
  padding: 8px 4px; cursor: pointer;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.015);
  color: var(--muted);
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  transition: all .18s;
  user-select: none;
}
.tbtn .ti { font-size: .95rem; line-height: 1; }
.tbtn:hover { border-color: var(--border-h); color: var(--text); background: var(--accent-dim); }
.tbtn.on { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* sliders */
.sl-row { margin-bottom: 9px; }
.sl-lbl {
  display: flex; justify-content: space-between;
  font-size: .62rem; letter-spacing: .08em;
  color: var(--muted); margin-bottom: 5px;
}
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 2px;
  background: rgba(168,159,216,.16); outline: none; border-radius: 1px; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 12px; height: 12px;
  background: var(--accent); border-radius: 50%;
  cursor: pointer; border: 2px solid #04060e;
}
input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px; background: var(--accent);
  border-radius: 50%; cursor: pointer; border: 2px solid #04060e;
}

/* colours */
.pal-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; margin-bottom: 8px; }
.sw {
  aspect-ratio: 1; border-radius: 3px; cursor: pointer;
  border: 2px solid transparent;
  transition: transform .14s, border-color .14s;
}
.sw:hover { transform: scale(1.18); border-color: rgba(255,255,255,.35); }
.sw.on { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
.cust-row { display: flex; align-items: center; gap: 7px; }
.cust-swatch {
  width: 28px; height: 28px; border-radius: 3px; cursor: pointer; flex-shrink: 0;
  border: 1px solid var(--border); transition: border-color .2s;
}
.cust-swatch:hover { border-color: var(--border-h); }
#cust-input { position:absolute; left:-9999px; opacity:0; pointer-events:none; }
.cust-lbl {
  font-size: .62rem; letter-spacing: .08em;
  color: var(--muted); cursor: pointer; flex: 1;
}
.cust-lbl:hover { color: var(--text); }

/* themes */
.theme-list { display: flex; flex-direction: column; gap: 5px; }
.thbtn {
  font-family: 'Josefin Sans', sans-serif;
  font-size: .64rem; letter-spacing: .12em; text-transform: uppercase;
  padding: 7px 10px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  text-align: left; display: flex; align-items: center; gap: 7px;
  transition: all .2s;
}
.thbtn::before {
  content: ''; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.thbtn[data-t="mist"]::before    { background: #a89fd8; }
.thbtn[data-t="moonlit"]::before { background: #7eb8f7; }
.thbtn[data-t="ember"]::before   { background: #f0a96a; }
.thbtn:hover { border-color: var(--border-h); color: var(--text); background: var(--accent-dim); }
.thbtn.on { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* action btns */
.abtn {
  font-family: 'Josefin Sans', sans-serif;
  font-size: .62rem; letter-spacing: .12em; text-transform: uppercase;
  width: 100%; padding: 7px 10px; margin-bottom: 5px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  text-align: left; transition: all .2s;
}
.abtn:hover { border-color: var(--border-h); color: var(--text); background: var(--accent-dim); }
.abtn:last-child { margin-bottom: 0; }
.abtn.danger {
  border-color: var(--danger-bd); color: var(--danger-tx); background: var(--danger-bg);
}
.abtn.danger:hover { background: rgba(200,55,55,.25); }

/* ── Canvas wrap ── */
.canvas-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; min-width: 0;
}
#cvs {
  touch-action: none; cursor: crosshair; display: block;
  box-shadow: 0 0 0 1px rgba(168,159,216,.1), 0 24px 90px rgba(0,0,0,.75);
}
body.cur-erase #cvs { cursor: cell; }
body.cur-fill  #cvs { cursor: default; }
body.cur-eye   #cvs { cursor: crosshair; }
body.cur-line  #cvs { cursor: crosshair; }

/* ── Status bar ── */
.statusbar {
  height: 26px; flex-shrink: 0;
  background: rgba(3,5,12,.92);
  border-top: 1px solid rgba(168,159,216,.07);
  backdrop-filter: blur(10px);
  display: flex; align-items: center;
  padding: 0 13px; gap: 14px;
  font-size: .60rem; letter-spacing: .10em; text-transform: uppercase;
  color: var(--muted);
}
.s-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.s-sp { flex: 1; }

/* ═══════════════════════════════════ GALLERY MODAL ════════════════════════════════ */
#gallery {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(3,5,12,.96);
  backdrop-filter: blur(20px);
  display: none; flex-direction: column;
  padding: 34px 38px;
}
#gallery.open { display: flex; }
.gal-hd {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 22px;
}
.gal-title {
  font-family: 'Cinzel', serif;
  font-size: 1.3rem; font-weight: 400;
  color: var(--text); letter-spacing: .08em;
}
.gal-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(165px,1fr));
  gap: 13px; overflow-y: auto; flex: 1;
}
.gal-grid::-webkit-scrollbar { width: 4px; }
.gal-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.gal-item {
  border: 1px solid var(--border); cursor: pointer;
  transition: all .2s; overflow: hidden;
  background: rgba(8,11,22,.8);
}
.gal-item:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,0,0,.5);
}
.gal-item img { width: 100%; height: 108px; object-fit: cover; display: block; }
.gal-info { padding: 8px 10px; }
.gal-name { font-size: .76rem; letter-spacing: .04em; color: var(--text); margin-bottom: 2px; }
.gal-date { font-size: .62rem; color: var(--muted); }
.gal-empty {
  grid-column: 1/-1; text-align: center; padding: 70px 0;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 1.2rem; color: var(--muted);
}
.gal-item-del {
  padding: 5px 8px; font-size: .58rem; letter-spacing: .1em;
  background: var(--danger-bg); border: none; border-top: 1px solid var(--danger-bd);
  color: var(--danger-tx); cursor: pointer; width: 100%; text-align: left;
  display: none; transition: background .2s;
}
.gal-item:hover .gal-item-del { display: block; }
.gal-item-del:hover { background: rgba(200,55,55,.28); }

/* ═══════════════════════════════════ MOBILE ════════════════════════════════════════ */
@media(max-width:680px) {
  .sidebar, .r-sidebar { display: none; }
  .h-center { display: none; }
  .logo-sub { display: none; }
}
</style>
</head>
<body>

<!-- ══ BACKGROUND ══════════════════════════════════════════════════════════════════ -->
<canvas id="stars-cvs" class="bg-canvas"></canvas>
<svg id="forest-svg" xmlns="http://www.w3.org/2000/svg"></svg>
<canvas id="ff-cvs" class="bg-canvas"></canvas>
<div class="fog-wrap">
  <div class="fog fog-a"></div>
  <div class="fog fog-b"></div>
  <div class="fog fog-c"></div>
  <div class="fog fog-d"></div>
</div>

<!-- ══ APP ═════════════════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- HEADER -->
  <header>
    <div style="display:flex;align-items:center;gap:11px;flex-shrink:0">
      <div class="logo">The <em>Hollow</em></div>
      <div class="logo-sub">Numa's Sketchbook</div>
    </div>
    <div class="h-center">
      <div class="tool-pill" id="pill">Brush · 8px · 100%</div>
    </div>
    <div class="h-right">
      <button class="hbtn" onclick="showGallery()">Gallery</button>
      <button class="hbtn" onclick="doImportJSON()">Import</button>
      <button class="hbtn" onclick="doExportJSON()">Export JSON</button>
      <button class="hbtn" onclick="doExportPNG()">Export PNG</button>
      <button class="hbtn" onclick="window.location.href='index.html'">Home</button>
      <button class="hbtn hi" onclick="doSave()">Save</button>
    </div>
  </header>

  <div class="main">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">

      <div class="section">
        <span class="sec-label">Tools</span>
        <div class="tool-grid">
          <button class="tbtn on" data-tool="brush"   onclick="setTool('brush')">
            <span class="ti">✦</span>Brush</button>
          <button class="tbtn"    data-tool="pencil"  onclick="setTool('pencil')">
            <span class="ti">✏</span>Pencil</button>
          <button class="tbtn"    data-tool="spray"   onclick="setTool('spray')">
            <span class="ti">✧</span>Spray</button>
          <button class="tbtn"    data-tool="fill"    onclick="setTool('fill')">
            <span class="ti">◈</span>Fill</button>
          <button class="tbtn"    data-tool="line"    onclick="setTool('line')">
            <span class="ti">╱</span>Line</button>
          <button class="tbtn"    data-tool="eraser"  onclick="setTool('eraser')">
            <span class="ti">◻</span>Eraser</button>
        </div>
      </div>

      <div class="section">
        <span class="sec-label">Size & Flow</span>
        <div class="sl-row">
          <div class="sl-lbl"><span>Size</span><span id="v-sz">8px</span></div>
          <input type="range" id="r-sz" min="1" max="120" value="8"
                 oninput="setSz(this.value)">
        </div>
        <div class="sl-row">
          <div class="sl-lbl"><span>Opacity</span><span id="v-op">100%</span></div>
          <input type="range" id="r-op" min="3" max="100" value="100"
                 oninput="setOp(this.value)">
        </div>
        <div class="sl-row">
          <div class="sl-lbl"><span>Smoothing</span><span id="v-sm">50%</span></div>
          <input type="range" id="r-sm" min="0" max="95" value="50"
                 oninput="setSm(this.value)">
        </div>
      </div>

      <div class="section" style="flex:1">
        <span class="sec-label">Actions</span>
        <button class="abtn" onclick="doUndo()">↩ Undo</button>
        <button class="abtn" onclick="doRedo()">↪ Redo</button>
        <button class="abtn danger" onclick="clearCanvas()" style="margin-top:7px">
          ✕ Clear Canvas</button>
      </div>

    </div><!-- /sidebar -->

    <!-- CANVAS -->
    <div class="canvas-wrap" id="wrap">
      <canvas id="cvs"></canvas>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="r-sidebar">

      <div class="section">
        <span class="sec-label">Colour</span>
        <div class="pal-grid" id="pal"></div>
        <div class="cust-row">
          <div class="cust-swatch" id="cswatch" onclick="openPicker()"></div>
          <input type="color" id="cust-input" value="#a89fd8"
                 oninput="onCust(this.value)" onchange="onCust(this.value)">
          <span class="cust-lbl" onclick="openPicker()">Custom …</span>
        </div>
      </div>

      <div class="section">
        <span class="sec-label">Theme</span>
        <div class="theme-list">
          <button class="thbtn on" data-t="mist"    onclick="setTheme('mist')">Deep Mist</button>
          <button class="thbtn"    data-t="moonlit" onclick="setTheme('moonlit')">Moonlit</button>
          <button class="thbtn"    data-t="ember"   onclick="setTheme('ember')">Ember Glow</button>
        </div>
      </div>

      <div class="section">
        <span class="sec-label">Canvas</span>
        <div class="sl-row">
          <div class="sl-lbl"><span>Background</span><span id="v-bg">Dark</span></div>
          <input type="range" id="r-bg" min="0" max="255" value="13"
                 oninput="onBgSlide(this.value)">
        </div>
        <div style="margin-top:8px">
          <button class="abtn" onclick="doSave()">Save Work</button>
          <button class="abtn" onclick="doExportPNG()">Export PNG</button>
          <button class="abtn" onclick="doExportJSON()">Export JSON</button>
          <button class="abtn" onclick="doImportJSON()">Import JSON</button>
        </div>
      </div>

    </div><!-- /r-sidebar -->

  </div><!-- /main -->

  <div class="statusbar">
    <div class="s-dot"></div>
    <span id="st">Ready · The Hollow</span>
    <span class="s-sp"></span>
    <span id="st-xy">0 · 0</span>
    <span id="st-sz">?×?</span>
  </div>

</div><!-- /app -->

<!-- GALLERY -->
<div id="gallery">
  <div class="gal-hd">
    <div class="gal-title">The Hollow · Gallery</div>
    <button class="hbtn" onclick="hideGallery()">✕ Close</button>
  </div>
  <div class="gal-grid" id="gg"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════════════
   BACKGROUND  ·  Stars · Trees · Fireflies
═══════════════════════════════════════════════════════════════════════════════════ */

/* Seeded PRNG – Mulberry32 */
function mkRand(seed) {
  let s = seed >>> 0;
  return function() {
    s += 0x6d2b79f5;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ── Stars ─────────────────────────────────────────── */
const starsCvs = document.getElementById('stars-cvs');
const sCtx     = starsCvs.getContext('2d');

function buildStars() {
  const W = starsCvs.width  = window.innerWidth;
  const H = starsCvs.height = window.innerHeight;
  sCtx.clearRect(0, 0, W, H);
  const r = mkRand(77), n = Math.floor(W * H / 1500);
  for (let i = 0; i < n; i++) {
    const x = r()*W, y = r()*H*0.72;
    const rad = r()*0.85+0.15, op = r()*0.45+0.1;
    const hue = (200 + r()*70) | 0;
    sCtx.beginPath(); sCtx.arc(x,y,rad,0,6.283);
    sCtx.fillStyle = `hsla(${hue},65%,85%,${op.toFixed(2)})`;
    sCtx.fill();
  }
  for (let i = 0; i < 4; i++) {
    const x = r()*W, y = r()*H*0.5, sz = 65+r()*115;
    const hue = (220+r()*60)|0;
    const g = sCtx.createRadialGradient(x,y,0,x,y,sz);
    g.addColorStop(0,`hsla(${hue},55%,60%,${(r()*.04+.01).toFixed(3)})`);
    g.addColorStop(1,'transparent');
    sCtx.fillStyle=g; sCtx.beginPath(); sCtx.arc(x,y,sz,0,6.283); sCtx.fill();
  }
}

/* ── Trees ─────────────────────────────────────────── */
const NS   = 'http://www.w3.org/2000/svg';
const fsvg = document.getElementById('forest-svg');

function branch(parent, x, y, angle, len, depth, maxD, rand, cfg) {
  if (len < 1.2) return;
  const rad = angle * Math.PI / 180;
  const ex  = x + len * Math.sin(rad);
  const ey  = y - len * Math.cos(rad);
  const t   = depth / maxD;
  const sw  = Math.max(0.35, cfg.tw * Math.pow(1 - t * 0.88, 2.5));
  const ln  = document.createElementNS(NS, 'line');
  ln.setAttribute('x1', x.toFixed(1)); ln.setAttribute('y1', y.toFixed(1));
  ln.setAttribute('x2', ex.toFixed(1)); ln.setAttribute('y2', ey.toFixed(1));
  ln.setAttribute('stroke-width', sw.toFixed(2));
  parent.appendChild(ln);
  if (depth >= maxD) return;
  const r1 = rand();
  const nb = depth === 0 ? 1 : depth < 2 ? 2 : r1 < 0.12 ? 1 : r1 < 0.78 ? 2 : 3;
  const sp = cfg.sp * (1 + depth * 0.12);
  const lf = cfg.lf * (0.84 + rand() * 0.32);
  if (nb === 1) {
    branch(parent, ex, ey, angle+(rand()-.5)*sp*.35, len*lf, depth+1, maxD, rand, cfg);
  } else if (nb === 2) {
    const ls=(sp*(.42+rand()*.42)), rs=(sp*(.42+rand()*.42)), lean=(rand()-.5)*sp*.12;
    branch(parent, ex, ey, angle-ls+lean, len*cfg.lf*(.8+rand()*.3), depth+1, maxD, rand, cfg);
    branch(parent, ex, ey, angle+rs+lean, len*cfg.lf*(.8+rand()*.3), depth+1, maxD, rand, cfg);
  } else {
    const s=sp*(.58+rand()*.28);
    branch(parent,ex,ey,angle-s,                  len*cfg.lf*(.78+rand()*.28),depth+1,maxD,rand,cfg);
    branch(parent,ex,ey,angle+(rand()-.5)*s*.22, len*cfg.lf*(.68+rand()*.22),depth+1,maxD,rand,cfg);
    branch(parent,ex,ey,angle+s,                  len*cfg.lf*(.78+rand()*.28),depth+1,maxD,rand,cfg);
  }
}

function addRoots(inner, rand, cfg) {
  const nr = 3 + Math.floor(rand() * 3);
  for (let i = 0; i < nr; i++) {
    const a=(rand()-.5)*80, l=cfg.th*.18+rand()*cfg.th*.12;
    const rad=a*Math.PI/180;
    const ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1','0'); ln.setAttribute('y1','0');
    ln.setAttribute('x2',(l*Math.sin(rad)).toFixed(1));
    ln.setAttribute('y2',(l*0.45).toFixed(1));
    ln.setAttribute('stroke-width',(cfg.tw*.55).toFixed(2));
    inner.appendChild(ln);
  }
}

function makeTree(cfg) {
  const rand  = mkRand(cfg.seed);
  const outer = document.createElementNS(NS, 'g');
  outer.setAttribute('transform', `translate(${cfg.x.toFixed(1)},${cfg.y.toFixed(1)})`);
  const inner = document.createElementNS(NS, 'g');
  inner.setAttribute('class',            cfg.sc);
  inner.setAttribute('stroke',           cfg.col);
  inner.setAttribute('stroke-linecap',   'round');
  inner.setAttribute('stroke-linejoin',  'round');
  inner.setAttribute('fill',             'none');
  addRoots(inner, mkRand(cfg.seed+9999), {tw:cfg.tw, th:cfg.th});
  branch(inner, 0, 0, 0, cfg.th, 0, cfg.maxD, rand, cfg);
  outer.appendChild(inner); fsvg.appendChild(outer);
}

function buildForest() {
  fsvg.innerHTML = '';
  const W=window.innerWidth, H=window.innerHeight, b=H;
  const bg='#070915', fg='#030409';
  [
    {x:W*.28,y:b,th:H*.22,sp:24,lf:.73,maxD:7,tw:7, sc:'swb',seed:91, col:bg},
    {x:W*.43,y:b,th:H*.19,sp:22,lf:.74,maxD:7,tw:6, sc:'swb',seed:92, col:bg},
    {x:W*.57,y:b,th:H*.21,sp:26,lf:.72,maxD:7,tw:7, sc:'swb',seed:93, col:bg},
    {x:W*.70,y:b,th:H*.17,sp:23,lf:.73,maxD:6,tw:5, sc:'swb',seed:94, col:bg},
  ].forEach(makeTree);
  [
    {x:W*-.04,y:b,th:H*.58,sp:27,lf:.69,maxD:11,tw:24,sc:'sw1',seed:1001,col:fg},
    {x:W*.09, y:b,th:H*.50,sp:36,lf:.65,maxD:10,tw:15,sc:'sw3',seed:2002,col:fg},
    {x:W*.20, y:b,th:H*.41,sp:31,lf:.71,maxD:10,tw:17,sc:'sw2',seed:3003,col:fg},
    {x:W*.32, y:b,th:H*.31,sp:29,lf:.72,maxD:9, tw:11,sc:'sw4',seed:4004,col:fg},
    {x:W*.66, y:b,th:H*.33,sp:27,lf:.72,maxD:9, tw:12,sc:'sw2',seed:5005,col:fg},
    {x:W*.78, y:b,th:H*.43,sp:30,lf:.70,maxD:10,tw:16,sc:'sw1',seed:6006,col:fg},
    {x:W*.89, y:b,th:H*.54,sp:25,lf:.68,maxD:11,tw:22,sc:'sw3',seed:7007,col:fg},
    {x:W*1.04,y:b,th:H*.46,sp:29,lf:.70,maxD:10,tw:18,sc:'sw4',seed:8008,col:fg},
  ].forEach(makeTree);
}

/* ── Fireflies ─────────────────────────────────────── */
const ffCvs = document.getElementById('ff-cvs');
const ffCtx = ffCvs.getContext('2d');
let flies = [], ffRaf;

class Firefly {
  constructor() { this.init(true); }
  init(rnd) {
    const W=ffCvs.width, H=ffCvs.height;
    this.x = rnd ? Math.random()*W : (this.tx ?? Math.random()*W);
    this.y = rnd ? H*(.18+Math.random()*.78) : H*(.25+Math.random()*.70);
    this.fg = Math.random()>.70;
    this.sz = this.fg ? Math.random()*1.9+1.1 : Math.random()*.9+.35;
    this.hue = 52+Math.random()*48; this.sat = 72+Math.random()*22;
    this.pSpd = Math.random()*.022+.010; this.pPh = Math.random()*Math.PI*2;
    this.spd  = (Math.random()*.0025+.0008)*(this.fg?1:.65);
    this.newTarget(); this.prog = Math.random();
  }
  newTarget() {
    const W=ffCvs.width, H=ffCvs.height;
    this.sx=this.tx??this.x; this.sy=this.ty??this.y;
    const d=50+Math.random()*130, a=Math.random()*Math.PI*2;
    this.tx=Math.max(15,Math.min(W-15,this.sx+Math.cos(a)*d));
    this.ty=Math.max(H*.12,Math.min(H*.92,this.sy+Math.sin(a)*d));
    const j=()=>(Math.random()-.5)*90;
    this.c1x=this.sx+j(); this.c1y=this.sy+j();
    this.c2x=this.tx+j(); this.c2y=this.ty+j();
    this.prog=0;
  }
  update() {
    this.prog += this.spd;
    if (this.prog >= 1) this.newTarget();
    const t=this.prog, m=1-t;
    this.x=m*m*m*this.sx+3*m*m*t*this.c1x+3*m*t*t*this.c2x+t*t*t*this.tx;
    this.y=m*m*m*this.sy+3*m*m*t*this.c1y+3*m*t*t*this.c2y+t*t*t*this.ty;
    this.pPh += this.pSpd;
    const p=.5+.5*Math.sin(this.pPh);
    this.op = this.fg?(0.28+p*.72):(0.08+p*.42);
    this.cs = this.sz*(0.65+p*.60);
  }
  draw() {
    const {x,y,cs:s,op,fg} = this;
    const h=this.hue|0, sat=this.sat|0;
    ffCtx.save(); ffCtx.globalAlpha=op;
    const hr=s*(fg?18:10);
    const g0=ffCtx.createRadialGradient(x,y,0,x,y,hr);
    g0.addColorStop(0,`hsla(${h},${sat}%,68%,.12)`);
    g0.addColorStop(.5,`hsla(${h},${sat-15}%,55%,.06)`);
    g0.addColorStop(1,'transparent');
    ffCtx.fillStyle=g0; ffCtx.beginPath(); ffCtx.arc(x,y,hr,0,6.283); ffCtx.fill();
    const mr=s*(fg?6:3.5);
    const g1=ffCtx.createRadialGradient(x,y,0,x,y,mr);
    g1.addColorStop(0,`hsla(${h},${sat}%,85%,.75)`);
    g1.addColorStop(.6,`hsla(${h},${sat}%,70%,.30)`);
    g1.addColorStop(1,'transparent');
    ffCtx.fillStyle=g1; ffCtx.beginPath(); ffCtx.arc(x,y,mr,0,6.283); ffCtx.fill();
    ffCtx.fillStyle=`hsla(${h+8},${sat-10}%,96%,.95)`;
    ffCtx.beginPath(); ffCtx.arc(x,y,s,0,6.283); ffCtx.fill();
    ffCtx.restore();
  }
}

function initFF() {
  ffCvs.width=window.innerWidth; ffCvs.height=window.innerHeight;
  flies=Array.from({length:Math.floor(ffCvs.width*ffCvs.height/5000)}, ()=>new Firefly());
}
function loopFF() {
  ffCtx.clearRect(0,0,ffCvs.width,ffCvs.height);
  flies.forEach(f=>{f.update();f.draw();});
  ffRaf=requestAnimationFrame(loopFF);
}

function initBg() {
  buildStars(); buildForest(); initFF();
  cancelAnimationFrame(ffRaf); loopFF();
}

/* ── History ── */
let hist = [], hIdx = -1;
const MAX_H = 40;

function snapHistory() {
  hist = hist.slice(0, hIdx + 1);
  hist.push(ctx.getImageData(0, 0, cvs.width, cvs.height));
  if (hist.length > MAX_H) hist.shift(); else hIdx++;
}
function doUndo() {
  if (hIdx > 0) { hIdx--; ctx.putImageData(hist[hIdx], 0, 0); status('Undo'); }
}
function doRedo() {
  if (hIdx < hist.length-1) { hIdx++; ctx.putImageData(hist[hIdx], 0, 0); status('Redo'); }
}

/* ── Pointer state ── */
let drawing    = false;
let lx=0, ly=0, lp=0.5;
let lineStart  = null;
let lineSnap   = null;

(function() {
  try { works = JSON.parse(localStorage.getItem('hollow_v2') || '[]'); } catch(e) { works=[]; }

/* ── Canvas resize ── */
function resizeCanvas() {
  const wrap = document.getElementById('wrap');
  const r    = wrap.getBoundingClientRect();
  const W    = Math.max(200, Math.floor(r.width  - 28));
  const H    = Math.max(200, Math.floor(r.height - 28));
  let saved  = null;
  if (cvs.width > 0 && cvs.height > 0) {
    try { saved = ctx.getImageData(0, 0, cvs.width, cvs.height); } catch(e){}
  }
  cvs.width = W; cvs.height = H;
  document.getElementById('st-sz').textContent = `${W}×${H}`;
  fillBg();
  if (saved) ctx.putImageData(saved, 0, 0);
  hist=[]; hIdx=-1; snapHistory();
}

function fillBg() {
  const v=bgVal;
  ctx.save();
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
  ctx.fillStyle=`rgb(${v},${Math.round(v*1.05)},${Math.round(v*1.4)})`;
  ctx.fillRect(0,0,cvs.width,cvs.height);
  ctx.restore();
}

let resizeT;
function debounceResize() {
  clearTimeout(resizeT);
  resizeT=setTimeout(()=>{ initBg(); resizeCanvas(); }, 160);
}

  const t=tmp.getContext('2d'); t.fillStyle=c; t.fillRect(0,0,1,1);
  const d=t.getImageData(0,0,1,1).data;
  return '#'+[d[0],d[1],d[2]].map(x=>x.toString(16).padStart(2,'0')).join('');

/* ════════ POINTER EVENTS ════════════════════════════ */
function getPos(e) {
  const r=cvs.getBoundingClientRect();
  const sx=cvs.width/r.width, sy=cvs.height/r.height;
  const cx=e.clientX??0, cy=e.clientY??0;
  return {
    x:(cx-r.left)*sx, y:(cy-r.top)*sy,
    p: (e.pressure!=null&&e.pressure>0) ? e.pressure : 0.5
  };
}

function setupPointer() {
  cvs.addEventListener('pointerdown', onDown);
  cvs.addEventListener('pointermove', onMove);
  cvs.addEventListener('pointerup',   onUp);
  cvs.addEventListener('pointerout',  onUp);
  cvs.addEventListener('pointercancel', onUp);
  cvs.addEventListener('contextmenu', e=>e.preventDefault());
  cvs.addEventListener('pointermove', e=>{
    const p=getPos(e);
    document.getElementById('st-xy').textContent=
      `${Math.floor(p.x)} · ${Math.floor(p.y)}`;
  });
}

function onDown(e) {
  e.preventDefault();
  cvs.setPointerCapture(e.pointerId);
  const p=getPos(e);
  drawing=true; lx=p.x; ly=p.y; lp=p.p;

  if (tool==='fill') {
    floodFill(Math.floor(p.x), Math.floor(p.y), color);
    drawing=false; snapHistory(); return;
  }
  if (tool==='line') {
    lineStart={x:p.x,y:p.y};
    lineSnap=ctx.getImageData(0,0,cvs.width,cvs.height);
    return;
  }
  paintDot(p.x, p.y, p.p);
}

function onMove(e) {
  if (!drawing) return;
  e.preventDefault();
  const p=getPos(e);

  if (tool==='line' && lineStart && lineSnap) {
    ctx.putImageData(lineSnap, 0, 0);
    drawLine(lineStart.x, lineStart.y, p.x, p.y, p.p);
    return;
  }

  // Lerp for smoothing
  const t=1-smoothing*.78;
  const nx=lx+(p.x-lx)*t;
  const ny=ly+(p.y-ly)*t;
  paintStroke(lx, ly, nx, ny, lp, p.p);
  lx=nx; ly=ny; lp=p.p;
}

function onUp(e) {
  if (!drawing) return;
  drawing=false;
  if (tool==='line' && lineStart) {
    const p=getPos(e);
    if (lineSnap) { ctx.putImageData(lineSnap,0,0); lineSnap=null; }
    drawLine(lineStart.x, lineStart.y, p.x, p.y, lp);
    lineStart=null;
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
  snapHistory();
}

/* ── Paint helpers ── */
function effSz(p) {
  if (tool==='pencil') return brushSz*.6*(0.45+p*1.1);
  if (tool==='eraser') return brushSz*(0.75+p*.6);
  return brushSz*(0.5+p*.9);
}

function prepCtx(p) {
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.globalCompositeOperation='source-over';
  ctx.shadowBlur=0;
  switch(tool) {
    case 'brush':
      ctx.globalAlpha=opacity;
      ctx.strokeStyle=ctx.fillStyle=color;
      ctx.shadowColor=color; ctx.shadowBlur=brushSz*.55;
      break;
    case 'pencil':
      ctx.globalAlpha=opacity*(0.45+Math.random()*.55)*(0.35+p*.85);
      ctx.strokeStyle=ctx.fillStyle=color;
      break;
    case 'spray': case 'line':
      ctx.globalAlpha=opacity;
      ctx.strokeStyle=ctx.fillStyle=color;
      break;
    case 'eraser':
      ctx.globalCompositeOperation='destination-out';
      ctx.globalAlpha=opacity*(0.55+p*.55);
      ctx.strokeStyle=ctx.fillStyle='rgba(0,0,0,1)';
      break;
  }
}

function cleanCtx() {
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function paintDot(x,y,p) {
  const s=effSz(p);
  prepCtx(p);
  ctx.lineWidth=s;
  ctx.beginPath(); ctx.arc(x,y,s/2,0,Math.PI*2); ctx.fill();
  cleanCtx();
}

function paintStroke(x1,y1,x2,y2,p1,p2) {
  if (tool==='spray') { sprayAt(x2,y2,p2); return; }
  prepCtx((p1+p2)/2);
  ctx.lineWidth=(effSz(p1)+effSz(p2))/2;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  cleanCtx();
}

function drawLine(x1,y1,x2,y2,p) {
  prepCtx(p);
  ctx.lineWidth=effSz(p);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  cleanCtx();
}

function sprayAt(x,y,p) {
  const r=brushSz*(0.8+p*.6);
  const cnt=Math.floor(brushSz*1.8*(0.5+p));
  ctx.fillStyle=color; ctx.globalAlpha=opacity*.55;
  for(let i=0;i<cnt;i++){
    const a=Math.random()*Math.PI*2;
    const d=Math.pow(Math.random(),.5)*r;
    ctx.beginPath(); ctx.arc(x+Math.cos(a)*d,y+Math.sin(a)*d,.9,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

/* ── Flood fill (scanline + tolerance) ── */
function floodFill(sx, sy, fillHex) {
  if(sx<0||sx>=cvs.width||sy<0||sy>=cvs.height) return;
  const id=ctx.getImageData(0,0,cvs.width,cvs.height);
  const px=id.data, W=cvs.width, H=cvs.height;
  const i0=(sy*W+sx)*4;
  const tr=px[i0], tg=px[i0+1], tb=px[i0+2], ta=px[i0+3];
  const fr=parseInt(fillHex.slice(1,3),16);
  const fg=parseInt(fillHex.slice(3,5),16);
  const fb=parseInt(fillHex.slice(5,7),16);
  if(tr===fr&&tg===fg&&tb===fb) return;
  const TOL=28;
  const match=i=>
    Math.abs(px[i]-tr)<=TOL && Math.abs(px[i+1]-tg)<=TOL &&
    Math.abs(px[i+2]-tb)<=TOL && Math.abs(px[i+3]-ta)<=TOL;
  const seen=new Uint8Array(W*H);
  const stack=[sx+sy*W];
  while(stack.length){
    const pos=stack.pop();
    if(seen[pos]) continue; seen[pos]=1;
    const i=pos*4;
    if(!match(i)) continue;
    px[i]=fr; px[i+1]=fg; px[i+2]=fb; px[i+3]=255;
    const cx=pos%W, cy=(pos/W)|0;
    if(cx>0)   stack.push(pos-1);
    if(cx<W-1) stack.push(pos+1);
    if(cy>0)   stack.push(pos-W);
    if(cy<H-1) stack.push(pos+W);
  }
  ctx.putImageData(id,0,0);
}


/* ════════ CANVAS ACTIONS ════════════════════════════ */
function clearCanvas() {
  if(!confirm('Clear the canvas? This cannot be undone.')) return;
  fillBg(); snapHistory(); status('Canvas cleared');
}


/* ════════ SAVE / LOAD ══════════════════════════════ */
function doSave() {
  const name=prompt('Name this work:','Sketch '+new Date().toLocaleDateString());
  if(!name) return;
  const data=cvs.toDataURL('image/png');
  works.push({id:Date.now(), name, data, date:new Date().toISOString(), theme});
  saveWorks(); status('Saved: '+name);
}

function loadWork(id, silent) {
  const w=works.find(x=>x.id===id);
  if(!w) return;
  const img=new Image();
  img.onload=()=>{
    fillBg();
    ctx.drawImage(img,0,0,cvs.width,cvs.height);
    hist=[]; hIdx=-1; snapHistory();
    if(!silent) status('Loaded: '+w.name);
    if(w.theme) setTheme(w.theme);
  };
  img.src=w.data;
}

function doExportPNG() {
  const link=document.createElement('a');
  link.download='hollow_'+Date.now()+'.png';
  link.href=cvs.toDataURL('image/png');
  link.click(); status('Exported as PNG');
}

function doExportJSON() {
  if(!works.length){status('No saved works to export'); return;}
  const blob=new Blob([JSON.stringify(works,null,2)],{type:'application/json'});
  const link=document.createElement('a');
  link.download='hollow_works.json';
  link.href=URL.createObjectURL(blob);
  link.click(); status('Exported '+works.length+' works as JSON');
}

function doImportJSON() {
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const arr=JSON.parse(ev.target.result);
        if(!Array.isArray(arr)) throw new Error('Not an array');
        let added=0;
        arr.forEach(w=>{ if(!works.find(x=>x.id===w.id)){works.push(w);added++;} });
        saveWorks(); status(`Imported ${added} work(s)`);
      } catch(err) { status('Invalid JSON file'); }
    };
    reader.readAsText(f);
  };
  inp.click();
}


/* ════════ GALLERY ══════════════════════════════════ */
function showGallery() {
  const modal=document.getElementById('gallery');
  const grid =document.getElementById('gg');
  grid.innerHTML='';
  modal.classList.add('open');
  if(!works.length){
    grid.innerHTML='<div class="gal-empty">No saved works yet.<br>Create something and save it.</div>';
    return;
  }
  works.slice().reverse().forEach(w=>{
    const item=document.createElement('div');
    item.className='gal-item';
    item.innerHTML=`
      <img src="${w.data}" alt="${w.name}" loading="lazy">
      <div class="gal-info">
        <div class="gal-name">${w.name}</div>
        <div class="gal-date">${new Date(w.date).toLocaleDateString()}</div>
      </div>
      <button class="gal-item-del" data-id="${w.id}">Delete</button>`;
    item.querySelector('img').onclick=()=>{ hideGallery(); loadWork(w.id); };
    item.querySelector('.gal-info').onclick=()=>{ hideGallery(); loadWork(w.id); };
    item.querySelector('.gal-item-del').onclick=e=>{
      e.stopPropagation();
      if(!confirm(`Delete "${w.name}"?`)) return;
      works=works.filter(x=>x.id!==w.id);
      saveWorks(); showGallery();
    };
    grid.appendChild(item);
  });
}
function hideGallery() { document.getElementById('gallery').classList.remove('open'); }


/* ════════ KEYBOARD SHORTCUTS ════════════════════════ */
function setupKeys() {
  document.addEventListener('keydown',e=>{
    const tag=e.target.tagName.toLowerCase();
    if(tag==='input'||tag==='textarea') return;
    if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();doUndo();}
    if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();doRedo();}
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();doSave();}
    if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault();doExportPNG();}
    if(e.key==='b') setTool('brush');
    if(e.key==='p') setTool('pencil');
    if(e.key==='e') setTool('eraser');
    if(e.key==='f') setTool('fill');
    if(e.key==='l') setTool('line');
    if(e.key==='s') setTool('spray');
    if(e.key==='['){const v=Math.max(1,brushSz-2);document.getElementById('r-sz').value=v;setSz(v);}
    if(e.key===']'){const v=Math.min(120,brushSz+2);document.getElementById('r-sz').value=v;setSz(v);}
    if(e.key==='Escape') hideGallery();
  });
}


/* ════════ GO ════════════════════════════════════════ */
setup();
</script>
